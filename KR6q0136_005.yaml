body:
  text: 化主或侍者寮具州縣名目出膀召請發心或知事頭首和會禮請之儀竝同頭首入寮訖打疊書疏茶湯藥施主所託收買之物竝宜子細用心特為交代煎點詢問去年事例合係堂頭親書或書內簡尺及時勾副請領如將帶係稅之物自合分明印稅人力行者須選慣熟及小心之人所有常住供利須自收掌不得全倚人力行者防有異心如有尊宿書信呈達訖然後作禮若見尊官門狀竝院門書信一時通呈看謁施主預先點檢門狀關牒書信恐有差誤及備茶湯人事之物低心耐煩善言化導如問山門事體竝須如實祇對不得妄有誇託及不得倚託官員威勢亦不得所管事外妄生節目恐滯歸期有妨交代既係院門津遣代衆持鉢當盡心竭力增益年目録除有病將息方可暫間不得遊山結夏縱饒於事無妨自是不成專注候化緣事畢納疏歸衆方可隨意施主名銜不得鹵莽漏落所抄錢物竝須收納分明檀門信施本為福田造業愚夫便同己物或蕩於酒色之費或畜為衣鉢之資或買度牒師名或與小師披剃殊不知一錢已上並屬衆僧千佛出世不通懺悔天堂未就地獄先成凡應主執之人宜奉清亷之誠矣堂頭乳藥及知事頭首人事之物竝依常年及衆人事例不宜分外曲取人情若實出自施主願心即無所害既離禪宇遍詣檀門俗士侵尋漸成汩沒常念早歸辨道不宜在外因循財色之間甚宜照顧院門餞送化主之法伺候化主起發有日前一日常住特為茶湯置食至日住持人升座餞送兼以偈頌激發道心送至門首頭首相伴茶湯相別化主歸院略行人事知事頭首勤舊相知兄弟詣客位陳謝相看喜𢌞還安樂款曲打疊施利竟乃封角小疏目録腳頭簿子細收付恐有漏落交代借問竝須忠告並具納施利狀一本式云當院化主比丘某昨奉堂頭和尚慈旨往某處化緣僧供等具疏呈納如後一化到僧供若干計錢若干一化到羅漢若干位計錢若干一化到粥若干會計錢若干內折到某物若干計錢若干內支湯茶人事工往來盤費錢若干已上除支外通計錢若干右件施利不多伏乞堂頭和尚諸知事首座大衆慈悲容納謹狀某年月日堂院化主比丘某狀狀後批云先借過常住錢若干今隨狀還納見到乳藥狀一本式云參學比丘某甲某物若干右謹獻堂頭和尚聊充乳藥伏乞慈悲容納謹狀某年某月日參學比丘某狀如小師即云小師比丘某安箱復內報知事納疏先將施利陳法堂上堂司報衆當面安椅子傍安香臺打鼓衆集住持人於椅前立侍者燒香大衆只依位問訊以施利在前也然後知客陳儀知客近前當面問訊云某路化主某人納疏乃引化主至住持人前問訊立知客於箱內取施利狀與化主化主呈上住持人化主問訊退身側立住持人香上薰顯付侍者侍者與書狀或維那知客對衆宣表訖化主近前當面問訊立知客又於箱內取乳藥狀與化主化主呈上住持人化主問訊退身側立住持人更不薰顯即付侍者侍者與書狀宣讀罷化主禮謝住持人兩展三拜一展云施利輕微上觸和尚下情無任惶恐之至又一展敘寒暄乃觸禮三拜次知事禮賀住持人次首座大衆禮賀住持人並兩展三拜賀詞云化主回還得無難事伏惟歡慶下情無任喜躍之至住持人與大衆作賀時小師從之次首座大衆與知事相賀各觸禮三拜詞云化主𢌞還得無難事伏惟歡慶禮畢住持人歸方丈首座大衆已下歸堂位知客引化主聖僧前大展三拜起於首座前觸禮三拜云此者緣化得無難事皆荷首座大衆法力廕庥首座已下答拜首座云大衆分衛且喜𢌞還施利甚豐不任感激知客引巡堂出次上堂頭大展九拜三拜云此者化緣得無難事皆荷和尚道力庇庥下情無任感激之至又三拜敘寒暄又三拜而起照位喫湯竝請新舊化主或前資勤舊相伴不過十數位而已知客次第巡寮衆寮寮主首座待之三日茶湯特為置食更不掛搭維那送入寮有處次日升堂陳謝有處納疏罷未人事先升座有處化主作開供齊續升堂如不請更不升堂下頭首應係堂頭所請諸頭首一年外先方便求退然後於粥前詣方丈咨聞觸禮三拜而退如堂司所請頭首等即不拘時節於維那處解罷藏下頭首即於藏主處解罷六頭首告退方丈茶湯同維那知客等伴送入寮兩展三拜送主人出餘但問訊而已以次頭首合入前資寮抽解只維那請喫茶湯相送入寮三日茶湯特為置食如係藏下所請諸頭首常住置食藏主更須管待也唯寮主寮首座無茶湯特為堂頭煎點侍者夜參或粥前稟覆堂頭來日或齊後合為某人特為煎點齊前提舉行者準備湯餅換水燒湯盞橐茶盤打洗光潔香花坐位茶藥照牌煞茶諸事已辨子細請客於所請客躬身問訊云堂頭齊後特為某人點茶聞鼓聲請赴問訊而退禮須矜莊不得與人戲笑或特為煎湯亦於隔夜或齊前稟覆訖齊後提舉行者隼備盞橐煎點並同前式請辭云今晚放參後堂頭特為某人煎湯齊罷侍者先上方丈照管香爐位次如湯瓶袞盞橐辨行者齊布茶訖香臺只安香爐香合藥𭪱茶盞各安一處報覆住持人然後打茶鼓若茶未辨而先打鼓則衆人久坐生惱若庫司打鼓詣寮打版並詳此意不宜太早衆客集侍者揖入方可煞鼓首座已下次第進前依照位立如見某人未到則令再請貴免住持人動念侍者亦不得倉遑候一時齊足請住持人出如客有不到侍者得住持人指揮方退椅子如住持人不指揮則不得專擅移退如客有不到或諸事不在前住持人不宜對衆作色令客不安或住持人先出椅前立祇候大衆侍者揖客而進亦可賓主立定侍者於筵外東南角立略近前問訊揖客坐侍者請客燒香大小問訊並代住持人行禮受請者並須逐一恭謹不宜慢易良久燒香燒香之法於香臺東望住持人問訊然後開合上香兩手捧香合起以右手拈合安左手內以右手捉香合蓋放香臺上右手上香向特為人焚之却右手蓋香合兩手捧安香臺上並須款曲細勿令敲磕或墜地更不問訊但整坐具叉手行詣特為人前問訊有處衆坐定侍者先在住持人邊立請坐具及請香以表殷重之禮今香臺邊向住持人問訊乃表請香之禮意者也轉身叉手依位立次請先喫茶次問訊勸茶次燒香再請次藥遍請喫藥次又請先喫茶次又問訊勸茶茶罷略近前問訊收盞橐次問訊離位侍者預令行者祗候衆客才起便移轉當面椅子特為人略近前一兩步間問訊而退以表謝茶之禮住持人送客出衆客回身同問訊而退侍者即時指揮行者退椅子收坐物或扇子摺疊復帕及香臺衣收拾茶湯及好盞橐交點洗元然後侍者並供過行者喫茶罷方可隨意免煩住持人尊重旨麾而已或本州大守本路監司本縣知縣並係大衆迎送堂頭並據主位如在縣下住持即接知縣自餘不須侍者燒香訖住持人起云欲獻粗茶或粗湯取某官指揮如其允許方可點茶如蒙歎賞住持人但云粗茶聊以表專不合輕觸諸官入院茶湯飲食竝當一等迎待若非借問佛法不得特地祇對檀越施主或官客相看只一次燒香侍者唯問訊住持而已禮須一茶一湯若住持人索喚別點茶湯更不燒香如檀越入寺亦一茶湯不須燒香堂頭非泛請僧喫茶臨時旋請侍者仍令行者安排坐位香火茶藥訖仍請之賓就坐侍者正面問訊燒香右手上香退身普同問訊如點好茶即不點湯也如坐久索湯侍者更不燒香也或新到暫到外寺僧相看只一次燒香普同問訊竝合一茶一湯侍者初見官客並當肅揖不須𢌞避主人平常僧俗於主人前不得相與祗揖問訊僧堂內煎點堂內煎點之法堂頭庫司用榜首座用狀令行者以箱復托之侍者或監院或首座呈特為人禮請訖貼僧堂門頰堂頭榜在上間若知事首座在下間監院或首座於方丈禮請住持人長版後衆僧集定入堂燒香大展三拜巡堂請衆齊後堂前鐘鳴就坐訖行法事人先於前門南頰朝聖僧叉手側立徐問訊離本位於聖僧前當面問訊罷次到爐前問訊開香合左手上香罷略退身問訊訖次至後門特為處問訊面南轉身却到聖僧前當面問訊面北轉身問訊住持人以次巡堂至後門北頰版頭曲身問訊至南頰版頭亦曲身問訊如堂外依上下間問訊却入堂內聖僧前問訊退身依舊位問訊叉手而立茶遍澆湯却來近前當面問訊乃請先喫茶也湯瓶出次巡堂勸茶如第一翻問訊巡堂俱不燒香而已喫茶罷特為人收盞大衆落盞在床叉手而坐依前燒香問訊特為人罷却來聖僧前大展三拜巡堂一匝依位而立行藥罷近前當面問訊仍請喫藥也次乃行茶澆湯又問訊請先喫茶如煎湯瓶出依前問訊巡堂再勸茶茶罷依位立如侍者行法事茶罷先問訊一時收盞橐出特為人先起於住持人前一展云此者特蒙和尚煎點下情無任感激之至又一展敘寒暄云伏惟和尚尊體起居萬福乃觸禮三拜送住持人出堂外侍者於聖僧前上下間問訊訖打下堂鐘如庫司或首座煎點茶湯了先收住持人盞衆知事或首座於住持人前一展云此日粗茶或云此日粗湯伏蒙和尚慈悲降重下情不任感激之至又一展敘寒暄云伏惟和尚尊體起居萬福乃觸禮三拜第三拜時住持人更不答拜但問訊大衆以表珍重之禮作禮竟送住持人出堂行法事人再入堂內聖僧前上下間問訊收盞罷再問訊打鐘出堂外首座亦出堂外與衆知事觸禮三拜如首座特為書記書記亦先出堂外與首座觸禮三拜而散堂頭結夏茶榜堂頭和尚今晨齊退就雲堂煎點特為首座大衆聊表結制之儀兼請諸知事光伴今月日侍者某人敬白堂頭解夏茶榜首尾同前但改云聊表解制之儀庫司結夏茶榜庫司今晨齊退就雲堂點茶特為首座大衆聊表結制之儀伏望衆慈同垂光降今月日庫司比丘某甲敬白庫司解夏茶榜首尾同前但改云聊表解制之儀首座結夏狀首座比丘某右某啓取今晨齊後就雲堂點茶特為書記大衆聊表結制之儀仍請諸知事伏望衆慈同垂光降謹狀月日首座比丘某狀封皮云狀請書記大衆首座比丘某甲謹封首座解夏狀首尾同前但改云聊表解制之儀如堂頭特為新舊知事首座及知事首座點茶榜狀如請知事頭首篇中已明知事頭首點茶知事諸頭首特為茶版鳴主人依位立揖衆就坐主人亦就坐但垂足而已良久揖請收足須臾起身問訊離位燒香右手上香問訊特為人訖歸本位一邊普同問訊大衆切不可主位椅子前問訊然後就本位問訊而坐澆茶三兩碗擎茶盞揖當面特為人只揖參頭及上下位然後喫茶茶罷或收盞只收主人盞起身問訊離位燒香歸位問訊同前次藥遍請喫藥次請先喫茶茶罷收盞訖問訊起送客至門首如寮主特為寮衆即請本寮首座為主自行法事若特為新到竝同知事之禮非見任頭首不得請知事茶湯恐妨公務及避嫌疑庫司諸頭首迎待新到之禮早晨齊後茶放參湯竝燒香一炷如晚間不請喫湯齊後茶了就座點喫入寮臘次煎點煎點之法燒香罷從寮主為頭問訊次從首座為頭問訊問訊罷澆茶遍巡寮勸茶良久近前問訊云茶粗恕不換盞乃燒香再請又巡寮問訊次行藥次行茶次勸茶兩次燒香問訊竝末後謝茶須依頭首次第第二番勸茶但從便簡省問訊一匝第一番勸茶但就上下間問訊普同亦可也次謝茶云此日粗茶特蒙寮主首座大衆慈悲降重觸禮三拜次巡寮一匝收盞問訊起如請喫茶寮內衆僧坐定時先燒香一炷云來日恭請寮主首座大衆特為點茶伏望慈悲降重觸禮三拜巡寮問訊訖然後當日點茶人行法事衆中特為煎點早晨茶隔宿請齊後茶早晨請晚間湯齊後請如請近上尊敬之人如立僧首座諸方宿德法眷師伯師叔師兄之類即大展三拜如不容則觸禮三拜如請以次尊敬之人如同參同行戒臘道行尊高可仰凡在已上者之類只觸禮三拜如平交或戒臘相等或是法眷弟姪之類但問訊請之安排坐位香花照牌了當至時門首迎客就坐問訊云請收足燒香問訊特為人罷問訊云請免坐具又夏熱即云請使扇冬寒即云請覆頂行茶澆湯約三五碗即問訊云請先喫茶湯瓶出即於特為人處問訊勸茶收盞罷如不收盞即云茶粗恕不換盞如點湯不換盞即云湯粗恕不換盞再燒香問訊特為人次行藥遍即問訊云請喫藥次行茶澆湯請先喫茶竝勸茶同前茶罷陳謝云此日點茶或云此日煎湯特為某人某人茶粗坐位不便下情無任感激之至如近上尊敬之人即大展三拜晚間放參前後詣寮禮謝如已次尊敬及平交陳謝云此日點茶或云煎湯特為某人某人兼不合起動某人相伴觸禮兩拜又云恐煩尊重晚間更不敢詣寮禮謝又禮一拜然後從相伴人一例問訊良久問訊收盞次問訊離位即先出門首送客衆中特為尊長煎點如特為本師及的親師伯師叔師兄之類如本寮坐位不便及妨礙衆人即借寮煎點請禮在前已說只特為一人本寮主首在主位特為人作席回正面左手上香近坐位前當面禮拜如兩人已上在照位與寮主相對左手上香筵外禮拜言句威儀諸事竝如持為堂頭煎點之法但末後禮拜起近前問訊罷不揖特為人先起却於筵外觸禮三拜陳謝相伴人次第問訊起出門相送至晚詣尊長寮禮謝及問訊陳謝寮主如自有寮舍特為人皆居正位燒香禮拜竝悉當筵若通方商量既是借寮與人煎點自合託故𢌞避不可自居主位令前人禮拜諸事不便
