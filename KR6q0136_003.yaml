body:
  text: 監院監院一職總領院門諸事如官中應副及參辭謝賀僧集行香相看施主吉凶慶弔借貸往還院門歲計錢糓有無與收出入準備逐年受用齋料米麥等及時収買并造醬醋須依時節及打油變磨等亦當經心眾僧齋粥常運勝心管待四來不宜輕易如冬齋年齋解夏齋結夏齋多茄會端午七夕重九開爐閉爐臘八二月半是如上齋會若監院有力自合營辦如力所不及即請人勾當如院門小事及尋常事例即一面處置如事體稍大及體面生剏即知事頭首同共商量然後稟住持人行之自住持人已下如有不合規矩不順人情大小諸事竝合宛轉開陳不得緘默不言亦不得言語麤暴訓誨童行之法宜以方便預先處置不得妄行鞭捶設有懲戒當庫堂對眾行遣不過十數下而已不虞之事不可不慎如發遣行者出院須十分有過責伏罪狀稟住持人遺之更不須決也如違之不當防避官中問難如請街坊化主莊主炭頭醬頭粥頭街坊般若頭華嚴頭浴頭水頭園頭磨頭燈頭之類應係助益常住頭首須當及時稟住持人請之不可怠慢遲延施主入院安排客位如法迎待如作大齋會預前與諸知事頭首商量免致臨時闕事監院之體當尊賢容眾上和下睦安存同事大眾常得歡心不得倚恃權勢輕邈大眾亦不得任意行事令眾不安非疾病官客竝當赴堂所貴二時行益行者齊整如庫司財用闕乏自當竭力運謀不宜干紊主人及舉似大眾如同事之人有才有德應推揚讚歎如有職事不前及梵行可疑當屏處密喻使激昂自新令法久住如有大故作過有害院門亦宜箸白住持人知自餘色容眾事坐視成功而已維那梵語維那此云悅眾出僧中事竝主之眾中新到掛搭禮須勤重諸方辨事及名德人別選上寮安排退院長老須依住持帖及開堂疏內資次於堂內三版頭安排齋粥座位如諸方名德亦依同類戒臘於三版頭次位安排堂中冬夏替換氈蓆及凉簾暖簾掛帳下帳開鑪閉鑪結夏戒牌須預前打疊處置堂內香燈洒掃堂前供器客前竝常提舉聖僧侍者堂司竝供頭行者備辨寮舍門戶牕牖按位牀帳動用什物常須照管整齊如有闕少聞庫司及直歲添換延壽堂病僧粥飰床帳使令行者之類竝常與堂主同共照管無令病人失所院中諸小頭首如堂頭侍者聖僧侍者延壽堂主爐頭眾寮寮主首座閣主殿主竝維那所請如殿閣內錢物浩汗即堂頭請之如犯規矩大者稟堂頭令出眾小者但令移寮如有喧爭且盡禮和會如兩爭人不伏然後依規矩行遣如眾中遺失被主堅要搜撿即白眾搜寮如搜撿不見則被主出眾或移寮如失物不多即和會被主令休免致喧眾及鈍滯叢林聖僧錢只宜買置香燈供具不得別處使用如開筒取錢入堂司收掌即同聖僧侍者上簿支破如係大僧帳須候官中指揮告報然後出榜曉示取脚色驗祠部依自來體例收供帳錢物如繳判公憑雖係庫司一面行遣若經由維那司事更詳審允當掛搭僧人祠部公憑竝須相驗真偽不得鹵莽如僧病申官及津送亡僧估唱衣物繳納亡僧度牒或紫衣師號文牒等竝維那專切管勾報庫司申官繳納公憑及亡僧度牒不得過官中條限讀疏白槌竝須詳審令施主生善新到茶湯特為不得闕禮及將新到戒臘報侍者知事頭首及掛搭本寮貴知戒臘次第新到某上座某年戒在某人下應令眾寮各造入寮牌臘次牌各一面逐時抽添所貴煎點坐位及寮主先後各無差悞動眾普請除寮主直堂竝須齊赴住持人除疾病官客輙不赴者侍者出眾典座典座之職主大眾齋粥須運道心隨時改變令大眾受用安樂亦不得枉費常住齋料及點撿厨中不得亂有拋撒選揀局次行者能者當之行令不得太嚴嚴則擾眾不宜太緩緩則失職造食之時須親自照管自然精潔如打物料竝齋粥味數竝預先與庫司知事商量如醬醋淹藏收菜之類竝是典座專管不得失時常切提舉火燭依時俵散同利務要均平如合係監院直歲庫主所管同共商量即可竝不須侵權亂職厨中竈釜什物如故舊損壞則逐施抽換添補教訓行者務循規矩如堂中行益諸寮供過竝須種種教詔令其通曉及見師宿須問訊側立擇靈利行者準備堂頭知事頭首等處供過常覺察諸寮行者慮有頑鈍供過不前如知事頭首再留行者即當權宜隨順不須堅要輪撥典座係厨中喫粥飰所食不得異眾二時食辨先望僧堂焚香禮拜訖然後發食直歲直歲之職凡係院中作務竝主之所為院門修造寮舍門窻牆壁動用什物逐時修換嚴飾及提舉碾磨田園莊舍油坊後槽鞍馬舡車掃洒栽種巡護山林防警賊盜差遣人工輪撥莊客竝宜公心勤力知時別宜如有大修造大作務竝稟住持人矩劃及與同事商議不得專用己見下知事執事一年外夜間入方丈告退觸禮三拜而出來晨粥上維那白徧槌罷乃從後門入先打槌一下云比丘某甲白大眾昨奉堂頭和尚慈旨令入庫司充某和事勾當今來心力勞倦告眾歸堂謹白又打槌一下於聖僧後轉身來住持人前兩展三禮住持人先令轉食卓子答拜次於聖僧前大展三拜巡堂出堂外與同事觸禮三拜請新知事罷住持人知事首座等送入堂內掛搭於住持人前觸禮三拜伴送入寮於住持人前兩展三拜先送出門次與大眾問訊而而散與新知事巡寮茶湯特為罷却與新交代舊同事就本寮特為煎點請頭首頭首者謂首座書記藏主知客浴主竝同已前和會知事之法受禮作賀一一如之請同座僧眾伴送入寮住持人前兩展三禮送出與僧眾觸禮三拜知客引巡寮如知事巡寮之法三日茶湯置食持為如請首座堂頭和尚就堂煎點茶牓首尾同前但改云特為新請首座聊表陳賀之儀如有舊首座即云特為新舊首座聊表賀謝之儀兼請知事大眾同垂光伴次日首座却為書記如無書記即特為以次頭首大眾就堂煎點請狀云首座比丘某啟取今晨齋退就雲堂煎點特為書記大眾仍請諸知事相伴幸冀法慈同垂光降月日具前位某狀封皮云狀請書記大眾具前位某謹封仍粘在狀前箱內呈請訖貼僧堂南頰次請堂頭入堂相伴齋前令行者請知事頭首齋時長版後眾集定首座即起聖僧前燒香大展三拜巡堂一匝出竝問訊堂外僧只在堂外封監院維那喫食仍先白第二座權代呪食書記藏主浴主水頭街坊炭頭凡係堂頭所請之人竝就本寮煎點堂頭侍者聖僧侍者殿主堂主淨頭爐頭之類竝係維那所請院門三日茶湯特為藏下殿主街坊表白竝係藏主所請院中茶湯特為同前首座首座之職表儀眾僧舉正非法堂中座位衣單掛鉢展鉢喫粥喫飰或茶或湯皆須細齊整凡是堂中一切不如法事於粥前以輭語曰眾言須簡當首座喫食不得太急須當欵曲相伴眾僧不得先了拱手視眾令眾怱遽如粥飰造作不如法或行益緊慢不調竝合座點撿說與主事人所貴堂眾安樂放參前首座入堂聖僧前燒香罷就位坐堂司行者報諸寮云首座坐堂慧林打寮前版三下報眾大眾入堂依單位相向而坐堂司行者先稟堂頭掛放參牌然後堂前上簾行者於首座前問訊低聲云和尚放參復於聖僧前躬身正立喝放參然後打放參鐘展單下帳罷歸寮問訊喫湯隨意如遇念誦歸寮問訊喫湯罷然後入堂展單下帳昏鐘下窻簾明即捲之堂中大眾未開靜前不得令捲單疊被上帳恐喧大眾粥後開靜已去晚間放參已前竝不得展單盖被而睡早晨長版齋時三下方可下鉢入堂時念佛時竝不得覆頂遍槌罷首座揖食罷然後作觀作觀罷安詳出生候首座喫食大眾方食食訖掛鉢乃至下床竝須詳緩不得麤躁已上竝是首座撿舉指示書狀書狀之職主執山門書疏應須字體真楷言語整齊封角如法及識尊卑觸淨僧俗所宜如與官員書信尤不得妄發每年化主書疏預先安排即時應副子細點拾恐封角差賺及漏落施主明䘖如寫常住書信即用常住紙筆如寫堂頭書信即用堂頭紙筆如發自己書信不宜侵用輕塵積嶽宜深戒之新到茶湯特為禮不可闕院門大牓齋會疏文竝宜精心製撰如法書寫古今書啟疏詞文字應須遍覧以益多聞若語言典重式度如法千里眉目一眾光彩然不得一向事持筆硯輕侮同袍不將佛法為事禪月齊己止號詩僧賈島慧休流離俗䆠豈出家之本意也藏主藏主掌握金文嚴設几案準備茶湯油火香燭選請殿主街坊表白供贍本寮及看經大眾請案之法先白看經堂首座借問有無案位欲來依棲如有案位即相看藏主白之茶罷藏主引至經堂案位前各觸禮一拜送藏主出聖像前大展三拜起觸禮首座一拜巡堂一匝相看殿主乞依時會經竝無拜禮早晨大眾起晚間放參前殿主鳴鐘會經交點出納會經僧應於藏內燒香禮拜慇重捧經路中不得與人語笑案上不得堆經安置筆硯雜物及禪策文字點燈上油退燈竝宜躬親欵曲細恐毀污聖教堂中不得接待賓客有人相訪默揖歸寮亦不得於看經窻外與人說話恐喧大眾如雲霧陰濕或拭手未乾或於火上或在月下竝非看經所宜還卷之法緊則損經慢前不齊不得以身倚案壓經不得口㗸經帶開函之法兩手捉上蓋左仰右俯交手取之輕放案上不令有聲蓋函之法右仰左俯交手合之亦須細開經摺帶還卷繫絛各有儀式請問堂中看經首座及慣熟之人經案邊竝不得解繫衣服把針捫虱如不識字先撿篇韻猶有疑者方可借問問字若繁有妨看轉如暫離案竝須蓋覆亦不得將袈裟疊安經上看經時端身正坐不得出聲及動唇口竝緣他事如夜間開靜退燈即時隨眾歸堂不得留燈違眾令首座動念如晚間移下燈版上油訖却有事故不及赴堂看經則取託鄰案移下燈版如欲退案亦先白看經堂首座及藏主還經入藏方可如意已上所說竝當藏主曉諭眾人若不如法方便開示所有支收文曆竝須開坐分明只係堂頭簽押
