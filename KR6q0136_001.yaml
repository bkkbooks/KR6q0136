body:
  text: 受戒三世諸佛皆曰出家成道西天二十八祖唐土六祖傳佛心印盡是沙門蓋以嚴淨毗尼方能洪範三界然則參禪問道戒律為先既非離過防非何以成佛作祖受戒之法應備三衣鉢具并新淨衣物如無新衣浣染令淨入壇受戒不得徣借衣鉢一心專注慎勿異緣像佛形儀具佛戒律得佛受用此非小事豈可輕心若徣借衣鉢雖登壇受戒竝不得戒若不增受一生為無戒之人濫廁空門虗消信施初心入道法律未諳師匠不言陷人於此今茲苦口敢望銘心既受聲聞戒應受菩薩戒此入法之漸也護戒受戒之後常應守護寧有法死不無法生如小乘四分律四波羅夷十三僧伽婆尸沙二不定三十尼薩耆九十波逸提四波羅提提舍尼一百衆學七滅諍大乘梵網經十重四十八輕竝須讀誦通利善知持犯開遮但依金口聖言莫擅隨於庸輩如不應食䓗韭薤蒜園荽酒肉魚兔及乳餅酥酪用蠐螮卵猪羊脂竝不應食如遇病緣寧捨身命終不以酒肉俗味毀禁戒非時食小食藥石與果子米飲豆湯汁之類如非齊粥二時竝是非時之食也並宜服禁財色之禍甚於毒蛇尤當遠離慈念衆生猶如赤子語言真實心口相應讀誦大乘資發行願尸羅清淨佛法現前皮之不存毛將安傅故經云精進持淨戒猶如護明珠辨道具將入叢林先辨道具所謂為山笠拄杖戒刀祠部筒鉢橐鞋袋內安布帕一條為腳布枕子鈴口鞋腳絣前後包巾白絹復包絛包枕袋蓋包小油單柿油單布臥單綿被淨巾三條一蓋被一喫食一常用小淨瓶浴巾浴裙函匱小鎖如茶器并其餘衣物竝隨家豐儉裝包前包內安僧衣手帕復訖坐具𮖐之偏衫或夾襖背心應係淨衣前包內安置後包內安被單綿衣襯汗應係觸衣之類先用白絹復復訖入包包枕袋內安浴巾浴裙笠子內安聖像經文茶器之類裝包之法當繫裙在偏衫之上先上前包次繫包枕次打後包次絡右肩掛鉢於左腋下鉢口向身次絡左肩掛鞋袋於右腋下先插戒刀於右腋下次插祠部筒於左腋下祠部袋用絛或帶絡肩上更用絛帶一條橫繫腰間如未打後包以前繫掛定倒翻起祠部筒然後上後包更是便次繫包絛然後插枕子茶筒淨瓶放絛上在前包左右安置之戴笠之法右手仰把笠緣提起旋轉安頂上平戴為最不得前仰後低或左右傾側下笠之法亦當仰手旋轉下之只用右手仰把笠緣當右肩提之拄杖之法有枝者為觸頭無枝者為淨頭行時淨頭在前右手𢹂之如下笠時在左手內路上逢人如略問訊仰左手把拄杖仰右手下笠斂杖笠當胸離寺之法與同袍敘別訖於三門外簷下上笠入寺之法於三門外簷下下笠左手𢹂杖乃垂杖頭右手提笠當右肩如遇同袍斂笠近胸表敬而已如便掛搭於僧堂前門南牀上先仰安笠子次以拄杖安牀當上當字聲去淨頭在北先取淨瓶茶筒枕頭安笠內次解包絛亦安笠內以鞋袋安地上鉢囊安笠上解後包并包枕安牀上次下前包安笠內或安後包單上先取袈裟坐具出然後將枕子包絛包枕前包都入後包內繫縛訖將淨巾𢹂鞋袋後架洗足具鞋襪却以鞋袋盛草鞋安牀下布巾淨手訖搭袈裟袖祠部詣堂司相看掛搭了如堂中有函匱即收行李安函匱中鎖之笠子拄杖歸寮如堂中無函匱收行李赴寮人事了聽寮主首座指授處所相看畢掛鉢安被於僧堂內茶筒文字置寮中案上旦過入門先問旦過所在入寮解卸訖具威儀到客位云暫到相看知客出各觸禮三拜暫到辭云此際經過幸獲瞻對知客辭云川途跋涉到來不易隨後知客皆詣寮回禮如看住持人亦當詣寮回禮若欲掛搭歇一兩日詣堂司相看掛搭具威儀袖祠部如二人已上則推一人人事精熟或戒臘高者為參頭於堂司相看尋行者報維那云新到相看相見各觸禮三拜喫茶罷起身近前云久嚮道風此者特來依棲左右且望慈悲維那云山門多幸特荷光臨乃各人依戒臘次第呈祠部與維那維那收訖次第安箱內新到觸禮一拜云此際多幸深謝溫存維那答一拜云官待蕭疏且希以道為念不喫湯維那送出堂司云請上座歸堂掛搭新到於僧堂前門南頰而入聖僧前參頭在北邊立定大展三拜收坐具從首座位巡堂一匝却到聖僧前問訊畢於前門內南頰牀下版頭第三位次第而坐維那依戒臘上牀曆訖令行者箱內托祠部相隨入堂有處維那先於聖僧前燒香新到起身牀前立相問訊了維那次第過祠部訖於版頭面東南觸禮一拜新到亦觸禮一拜維那依戒臘次第掛搭觸禮一拜維那常占上手如前門北頰維那面東北如前門南頰即面東南如後門北頰即面西北如後門南頰即面西南也掛搭訖維那出有處出前門有處出後門新到相送後門出者新到不過門限前門出者門外相別維那云請某上座於某上座於某寮抽解問訊而別新到歸寮尋寮主云新到相看見寮主各觸禮三拜茶罷參頭以下起身近前云維那指揮令入上寮依棲左右於是寮主看詳戒臘高低指參頭以下一例就看讀牀按掛搭各觸禮一拜新到於聖像前次第立定問訊訖巡寮罷乃尋寮中首座相看各人觸禮三拜取行李咨問寮主首座安排乃上堂頭看侍者未用作禮云新到禮拜和尚相煩侍者咨報如堂頭人客相看或歇息即延客茶湯如無阻節便可引領即未用點茶侍者乃問上座是入室弟子否是法眷否如不是入室并法眷即一道相看若是入室弟子候新到人事罷方可相看侍者乃先報堂頭云若干人新到若干人入室弟子若干人法屬禮拜然後引入新到兩展三禮如在上法眷亦兩展三禮所以還住持人公界之禮也然住持人不當受禮亦不可觸禮住持人但云少間詣寮禮拜當選近上寮舍安排住持人詣寮𢌞禮如親密尊長即大展九禮免則兩展三禮又免則觸禮三拜如法眷稍疏即兩展三禮或觸禮三拜如至親法眷不論尊𢍉知事頭首小師行者竝合入事入室弟子洎法眷卑行竝大展九拜或兩展三拜參頭曲躬近前云久嚮和尚道價此日獲奉尊顏下情不任喜躍之至退身依位又一展云某寒暄伏惟和尚尊體起居萬福正月孟春猶寒二月仲春漸暄三月季春極暄四月盂夏漸熱五月仲夏毒熱六月季夏極熱七月孟秋猶熱八月仲秋漸凉九月季秋霜冷十月孟冬漸寒十一月仲冬嚴寒十二月季冬極寒入室弟子云久違和尚慈誨此日獲奉尊顏法眷云久承和尚法蔭此日獲奉尊顏下情無任及寒暄同前茶湯罷乃看侍者庫司首座書記藏主知客云此日多幸獲依棲略敘寒暄各觸禮三拜如曾作暫到知客處更不作禮詢問久住如浴主有煎點即看浴主及詢問法眷兄弟相看禮拜三日內常在寮中及僧堂內守待請喚茶湯不得閒遊免令尋覔侵晨早起恐請者喧衆有處住持人知事頭首當日就寮回禮新到但問訊而退更不就座知事頭首於諸寮相看竝居客位唯住持人可居主位新到竝出門迎送若欲起離須守堂儀半月并點入寮茶訖或聖節上殿罷臨行告白寮主并上下肩方可前去如名德人入院掛搭住持人并維那知客同送入獨寮安下次則維那送入或從衆寮內遷出或自監院首座藏主退下於獨寮抽解竝須於堂頭謝寮或大展或兩展三拜或觸禮三拜禮數隨宜次謝維那或問訊或觸禮三拜至起移日却於方丈及維那處退寮禮數隨宜同前戶鈎魚鑰竝當面呈納維那方可前去新到掛搭如經本院曾作知事頭首化主竝於前資寮抽解諸方辨事才德之人并命服師名者竝於上寮安排自兩人以上更不謝寮退寮結夏未終堂儀未滿實有急幹須白堂司請假不得擅便前去山門當有重罰若請假遊山若過半月須呈祠部再守堂儀判憑式某院褐紫衣僧某右某所有某年文帳在某寺院供申今執本名度牒六念戒牒共三本全赴使衙呈驗欲判公憑往某處巡禮為地頭伏乞某官特賜筆命施行伏候台旨或指揮謹狀年月用院印日具前位某狀批憑式具位同前右某伏為昨於某月某日於某處起判公憑往某處巡禮為地頭今為氣疾發動前去未得恐違公憑程限伏乞批鑿未敢專擅伏候裁旨謹狀年月不用印日具前位某狀赴粥飯粥飯坐位須依戒臘資次早晨開靜之後齊時三下已前先於食位就坐候長版鳴及打三下即起身下鉢舊說不得過三位放鉢須當上肩打木魚已後竝不得入堂入堂之法前門入者竝從南頰入先舉右足所以不從北頰入者尊住持人也後門入者上間坐即北頰入先舉左足下間坐即南頰入先舉右足於聖僧前問訊訖坐上牀之法問訊鄰位先以右手斂左邊衣袖腋下壓定復以左手斂右邊衣袖略提提然後兩手提面前袈裟次併以左手提之即踏牀近裏而坐然後棄鞋先以左手托牀次先縮左腳上牀次收右腳舉身正坐左腳壓右腳敷袈裟蓋膝上不得露內衣亦不得垂衣坐牀緣須退身一鉢許地以明護淨一安袈裟二展鉢盂三頭所向是名三淨監院維那直歲侍者等在堂外上間知客浴主炭頭街坊堂主等在堂外下間鳴鼓三通住持人赴堂知事頭首依位問訊堂前鳴鐘大衆同下牀住持人入堂問訊聖僧罷與大衆問訊然後就位復問訊訖住持人就座大衆方可上牀侍者沙彌參隨住持人下堂外排立候大衆坐一時問訊然後侍者入卓子問訊出次後維那入堂聖僧前問訊罷燒香就站槌邊立大衆展鉢洪濟添打槌一下云大衆各念心經三卷回向某人諸方設土地粥方有此一槌如遇吉凶齊設行香罷跪爐次槌一下云稽首薄伽梵圓滿修多羅大乘菩薩僧功德難思議或云佛法僧寶最勝良田凡所歸投皆彰感應或云水澄秋月現懇禱福田生唯有佛菩提是真歸仗處蓋槌邊不可誦長偈也今晨修設有疏恭對雲堂代伸宣表伏惟慈證宣疏罷云上來文疏已具披宣聖眼無私諒垂昭鑒仰憑尊衆念良久云清淨法身等下槌太疾即打著佛腳下槌太漫則打著佛頭如遇尋常填設即白槌云仰惟三寶咸賜印知更不歎佛也十聲佛罷良久打槌一下首座施食粥云粥有十利饒益行人果報生天究竟常樂又云粥是大良藥能除消飢渴施受獲清凉共成無上道齊云三德六味施佛及僧法界人天普同供養鑽飰云施者受者俱獲五常色力命安得無礙辨已上竝引聲高唱也施食訖行者喝食入喝食須言語分明名目不賺若有差誤受食之法不成須令再唱行食太速受者倉卒行食太遲坐久生惱食遍維那白槌一下首座接食觀想訖大衆方食維那於聖僧帳後轉身問訊首座乃請首座施財却歸本位打槌一下首座施財喝云財法二施等無差別檀波羅蜜具足圓滿庫頭或維那次第行襯輕手放僧前單上意在恭敬衆僧合掌受襯不得眼覷及不得將襯錢擲被位作聲齊畢收之展鉢之法先問訊解復帕取鉢拭疊令小及匙筯袋當面近身橫放次展淨巾蓋膝開復帕及疊三角向裏令齊整一角垂牀緣先以兩手開鉢單覆右手把向身單緣蓋鉢盂上即仰左手取鉢安單上左邊以兩手頭指拼取鐼子從小次第展之不得作聲如坐位稍窄只展三鉢次開袋取匙筯取則先筯入則先匙安橫於頭鐼之後匙筯頭向上肩鉢刷安下肩單外緣刷柄向外以待出生行食之法當淨人自行僧家不得自手取食淨人行食禮合低細羮粥之類不得污僧手及鉢盂緣點杓三兩下良久行之曲身斂兩手當胸粥飰多少各隨僧意受食之法兩手捧鉢低手離鉢單平鉢受之應量而受不得有餘維那未白遍槌不得擎鉢先作供養候聞遍槌合掌揖食次作五觀一計功多少量彼來處二忖己德行全缺應供三防心離過貪等為宗四正事良藥為療形枯五為成道故應受此食也然後出生未作五觀非己食分不得出生偈云汝等鬼神衆我今施汝供此食遍十方一切鬼神共喫食之法擎鉢就口不得將口就食鉢盂外邊半已上名淨半已下名觸以頭指安鉢內第二第三指傅鉢外第四第五指不用鐼子亦如之取鉢放鉢及拈匙筯不得有聲四分律云正意受食平鉢受羮飰羮飰俱食以次食不得挑鉢中央食無病不可得為己索羮飰不得以飰覆羮更望得不得視比座鉢中起嫌心當繫鉢想食不得大摶飰食不得張口待飯食不得含食語不得摶飰擲口中不得遺落飰食不得頰飰食不得嚼飰作聲不得吸飰食不得舌䑛食不得振手食不得手把散飰食不得汙手捉食器已上律文竝宜遵守亦不得抓頭令風屑墮盂鐼中亦不得搖身捉膝踞坐缺伸及搐鼻作聲如欲嚏噴須當掩鼻如欲挑牙須當掩口菜滓果核安鐼鉢後屏處以避鄰位之嫌如鄰位鉢中有餘食及果子雖讓不得取食及鄰位有怕風之人不得使扇如自己怕風白維那堂外喫食或有所須默然指授不得高聲呼取食訖鉢中餘物以鉢拭淨而食之頭鉢受水次第而洗仍不得於頭鉢內洗鐼子次第拭鉢鐼令極乾匙筯洗拭盛袋內鉢水之餘不得瀝牀下棄鉢水真言曰唵摩休羅細莎訶頭鉢以下以兩手大指拼安鉢內仰左手把鉢取安帕復中心覆右手把近身單緣蓋鉢盂上兩手疊單安鉢口次以向身帕角覆鉢上又以垂牀緣帕角向身覆之然後疊淨巾兼匙筯袋鉢刷在帕上以鉢拭覆之復鉢盂訖聞下堂槌念食訖偈飰食訖已色力充威震十方三世雄回因轉果不在念一切衆生獲神通住持人出起身掛鉢令掛搭單齊整蹲身踞牀坐然後左手斂後裙衣襯體覆牀緣徐徐垂足而下不得跨牀便下如堂內大坐茶湯入堂出堂上牀下牀竝如此式粥後放參即住持人出堂打放參鐘三下如遇早參更不打鐘如為齊主三下後升堂亦須打放參鐘大坐茶湯罷住持人聖僧前問訊出即打下堂鐘三下如監院首座入堂煎點送住持人出却來堂內聖僧前上下間問訊罷盞槖出方打下堂鐘三下大衆方可下牀出堂威儀竝如入堂之法赴茶湯院門特為茶湯禮數殷重受請之人不宜慢易既受請已須知先赴某處次赴某處後赴某處聞鼓版聲及時先到明記坐位照牌免致倉遑錯亂如赴堂頭茶湯大衆集侍者問訊請入隨首座依位而立住持人揖乃收袈裟安詳就座棄鞋不得參差收足不得令椅子作聲正身端坐不得背靠椅子袈裟覆膝坐具垂面前儼然叉手朝揖主人常以偏衫覆衣袖及不得露腕熱即叉手在外寒即叉手在內仍以右大指壓左衫袖左第二指壓右衫袖侍者問訊燒香所以代住持人法事常宜恭謹待之安祥取盞槖兩手當胸執之不得放手近下亦不得太高若上下相看一樣齊等則為大妙當須特為之人專看主人顧揖然後揖上下間喫茶不得吹茶不得掉盞不得呼呻作聲取放盞槖不得敲磕如先放盞者盤後安之以次挨排不得錯亂右手請茶藥擎之候行遍相揖罷方喫不得張口擲入亦不得咬令作聲茶罷離位安詳下足問訊訖隨大衆出特為之人須當略進前一兩步問訊主人以表謝茶之禮行須威儀庠序不得急行大步及拖鞋踏地作聲主人若送回有問訊致恭而退然後次第赴庫下及諸寮茶湯如堂頭特為茶湯受而不赴如卒然病患及大小便所逼即託同赴人說與侍者禮當退位如令出院盡法無民住持人亦不宜對衆作色嗔怒寮中客位并諸處特為茶湯竝不得語笑請因緣或半月堂儀罷或一二日茶湯罷各隨住持人建立於入室前相看侍者咨問請話侍者報訖然後入參頭已下面北立定次第燒香畢參頭出班當面問訊轉身禪椅西南角問訊云某等生死事大無常迅速伏望和尚慈悲開示因緣若堂頭聽許參頭歸位與大衆大展三拜收坐具起大衆轉身禪椅西邊東面次第問訊而立請因緣訖參頭已下依舊位大展三拜問訊出有處咨聞三拜陳謝六拜共九拜有處咨聞陳謝各六拜共十二拜咨聞辭云伏蒙和尚慈悲特賜開允下情無任喜躍之至謝辭云某等宿生慶幸已蒙和尚慈悲開示因緣下情無任威恩激切之至却下就寮陳謝侍者或各觸禮一拜或只問訊而已或有處大衆立定只參頭一人燒香咨聞訖歸位與大衆大展三拜然後問訊罷同轉身請話畢參頭已下次第燒香當面依位立大展三拜或六拜如上軌則各逐家風須問侍者依而行之不得執見檐版令主人怪怒新掛搭人如舊曾問訊即於入室時燒香稟問云告和尚慈悲乞依舊入室允則大展三拜云伏蒙慈悲特賜開允下情無任感激之至又退身三拜如免只大展三拜入室或分廊或分寮或隔日或排日或早或晚各逐住持人建立入室時到侍者令行者裝香當面設拜席有處不拜更不展席竟咨稟住持人如有指揮入室則掛入室牌或打鼓或打版或敲入室牌警集大衆住持人坐侍者方丈外東邊叉手立如衆稍集排立定或一行面東或兩行相對侍者入方丈當面問訊轉身禪椅東邊香臺後面南立先問訊左手上香問訊訖當面問訊出於大衆前問訊請入室侍者歸寮入室人略轉身問訊大衆依次第叉手而進不得攙前令衆動念於方丈門右邊入先舉左足當面問訊訖轉身叉手禪椅西南角問訊而立又先問訊然後吐露消息不得語話多時亦不得說世諦間話久滯大衆吐露竟問訊退當面禮拜有處一拜有處三拜有處大展有處觸禮面東轉身叉手從左邊出先舉左足所以避後來之人免有衝撞出方丈外望住持人問訊乃去至大衆前又問訊而出或作兩行入室入門便分兩向東西次第送進有處或舉話或通話或請益各分一時不許相雜有處混而為之大衆入室竟侍者入室仍捲席而退入室禮合燒香燒香之法初入方丈當面問訊訖轉身叉手於香臺南去向住持人問訊右手上香當面問訊禪椅角立今以滯時妨衆故不燒香有處門外設席一拜而退亦恐妨衆也入室人常令衣服完淨無帶垢膩及令威儀齊整舉止安祥以表敬重人之意也曉諭侍者非緊急人客要切事務於入堂時不得通報仍令行者不得出聲說話敲磕喧衆武夷虞知府宅書局刊行
