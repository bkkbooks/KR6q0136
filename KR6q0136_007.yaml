body:
  text: 大小便利欲上東司應須預往勿致臨時內逼倉卒乃疊袈裟安寮中案上或淨竿上問訊而去即先披挂子然後左臂搭淨巾不得由尊殿經過於東司近外淨竿上安挂子手巾訖捲裙疊遍衫搭東司前竿上仍置遍衫於裙上以腰絛繫之一以記號二恐墮地右手攜瓶詣廁棄鞋亦須齊整輕手掩門低手放瓶臨廁彈指三下以警噉糞之鬼不得涕唾狼籍努氣作聲廁籌劃地隔門壁共人語笑洗淨之法冷水為上如用熱湯引生腸風右手提瓶左手用水仍護第一第二指不得撒水污地及槽脣左右用籌不得過一莖有人用籌訖自洗而出洗手先灰次土至後架用皂莢澡豆並洗至肘前盥嗽訖準律須嚼楊枝還至本處收挂子淨巾問訊袈裟披之準律若不洗淨不得坐僧牀及禮三寶亦不得受人禮拜初到廁門如內有人不得謦咳彈指及以語言相逼如先在廁上覺外有人即須早出自洗籌者至此不宜如上尿寮小解收衫袖裙衣近裏蹲身不得涕唾説話常須回避宿德之人淮律小便亦須洗淨違者同前亡僧如僧人病勢稍困堂主計會維那監院首座藏主書記知客同共抄劄口辭收祠部并衣物入堂司收掌首座封押并收掌鑰匙知事申官如加病勢即再申困重如已遷化又申官乞行殯送三日內繳納祠部或紫衣師號牒亡僧初化即澡浴梯頭披挂子坐桶內以龕貯之置延壽堂前設香火供養并剪造白幡書無常偈及置佛喪花於龕上題云歿故某人上座之靈集衆念誦是夜法事誦戒回向來日早晨或齋後津送至日維那於粥飯遍槌罷或行襯罷白槌一下云大衆粥後或齋後聞鐘聲各具威儀普請送亡僧除諸寮頭首並皆齊赴謹白打槌一下維那乃於聖僧前問訊復於住持人前問訊巡堂一匝如堂外有僧亦當問訊除後僧堂時至鳴鐘龕前齊集住持人已下次第燒香維那念誦竟鳴鼓舉龕前行大衆隨後把幡提磬香爐香臺法事庫司知事預前差撥行者直歲部領舉龕準此備柴薪壇前一宗諸事並皆主之既至塔頭住持已下燒香略聲法事下火訖當有法語十念阿彌陀佛再聲法事罷散或有諷經各隨自意若在城隍送葬之法須當往還次序齊整不得戲笑默念佛名祕語回向亡人齊赴齊歸並不得留身在後若有所幹別日於堂司請假次日堂主維那法事收骨入普同塔或散水內唱衣之法挂牌告衆鳴鐘入堂先為亡僧念誦次將衣鉢請首座驗封頭對衆開之未鳴鐘前先將衣鉢陳於堂內次第估唱訖維那復為亡僧念誦住持人并內知事並不得唱亡僧衣物維那支破須合衆情不得妄有費用除用外俵大衆看經或暫到見送亡僧及見唱衣三分得一施主看經亦如之如多有衣鉢即抽那設粥或齋供至於上七日集衆人所誦經呪同時宣表破使文字張挂後架令衆人知之衆知事簽押以表通衆無私出家之人修行之外常令衣鉢齊整足用而已不宜蓄積增長貪心唱衣之日免令大衆久坐生惱又不得全無衣鉢免令身後侵損常住凡唱亡僧衣物此謂對破慳心及與亡僧結緣不可賤唱貴賣如所唱衣物價例太高不得動念免令衆人輕笑維那唱衣須知所唱衣物價例高低新即言新舊即言舊破即言破聲定錢陌或足或省或是依除如大衆不肯添錢雖賤亦須打與如添錢太過維那即云更須子細後悔難追免致衆中動念生事亦不得寄唱衆人及常住衣物恐涉嫌疑如常住或堂頭入衆唱衣即許人寄唱病僧前念誦維那嘆佛罷云今晨即有在疾比丘某人奉為釋多生之冤對懺纍劫之愆尤特運至誠仰投清衆稱揚聖號蕩滌深殃仰憑尊重念清淨等又回向云伏願某人一心清淨四大輕安壽命與慧命延長色身與法身堅固如病重之人即與十念阿彌陀佛念誦之法先嘆彌陀佛罷次白衆為某人長聲念阿彌陀佛四聖名號回向云伏願某人諸緣未斷早遂輕安大命難回願生安養又念四聖名號罷勸令攝心清淨念不得攀緣俗事也龕前念誦亡僧初入龕堂司告衆鳴鐘集之龕前住持人已下知事堂首并堂主次第拈香畢維那聲磬歎佛罷云切以生死交謝寒暑迭遷其來也電激長空其去也波停大海是日即有歿故比丘某生緣既盡大命俄遷了諸行之無常乃寂滅而為樂恭投大衆肅詣龕幃誦諸聖之洪名薦清魂於淨土仰憑大衆念清淨法身等又回向云伏願神超淨域業謝塵勞蓮開上品之華佛授一生之記又云再勞尊衆念十方三世等舉龕念誦詞云欲舉靈龕赴茶毗之盛禮仰憑尊衆誦諸聖之洪名用表攀違上資覺路念十聲佛號罷便行塔前十念詞云切以歿故某人既隨緣而順寂乃依法以荼毗焚百年弘道之身入一路涅槃之徑仰憑尊衆資助覺靈乃稱十念罷云上來稱揚聖號資薦往生惟願慧鏡分輝真風散彩菩提園裏開敷覺意之花法性海中蕩滌塵心之垢茶傾三奠香爇一爐用薦雲程和南聖衆唱衣前念誦大衆集維那鳴磬一下云浮雲散而影不流殘燭盡而光自滅今茲估唱用表無常仰憑尊衆奉為歿故某人上坐資助覺靈往生淨土念清淨法身云云等復鳴磬云夫唱衣之法蓋稟常規新舊短長自宜照顧錢須足陌或七十七陌或七十五陌無以新錫相兼磬聲斷後不得翻悔謹白唱衣竟乃云上來大衆念誦并唱衣物功德並用回向歿故某人資助覺靈往生淨土再煩大衆念十方三世一切諸佛並以志誠念佛不得戲笑語話乖角誦戒煎湯唱衣點茶並係庫司所管準律死尸并衣物並不得塔下過亦不得於塔下燒死尸請立僧退院尊宿首座藏主如合衆望可舉立僧即住持人升座舉白訖知事大衆詣寮禮請請辭云大衆傾心久思示誨伏望慈悲俯賜開允如不允更不答拜云自救不了豈可為人如允即時還禮云既蒙堅請不敢固辭乃上方丈陳謝禮數隨宜退院尊行謝云本欲依棲貴藏衰拙既蒙見舉不敢奉違答云象駕既臨法輪常轉雖然不合奉煩且以佛法為念退院平交謝云方圖自養復為為人上命難違下情多愧答云不合奉煩且以佛法為念諸方名德及參學小師謝云此蒙和尚指揮今受兄弟問設雖無深證不敢固辭下情無任惶恐感激之至答云既有餘光且以佛法為念並相看陳謝知事次日堂頭庫下特為煎點置食隨意請尊宿監院維那內推排一人外頭首內推排一人并前資勤資推排有心力曉叢林慣熟了事者數人具合用錢物行李人轎等或舟船要用之物官疏院疏僧官疏諸院長老疏施主疏間居官員疏住持帖本州縣開報彼處州縣文殊官員書信院門茶榜並須子細備辨如法安置如錢物之類須選一僧主管收支不得多用亦不得太儉防避官中點檢並不得張皇聲勢出於不意為上專使一人先經彼州縣下關牒然後入院安下如彼州縣不肯發遣即請回牒先令專使一人執回牒報本處州縣不得便回如有文字再請即依前告彼州縣發遣如無再請文字方可歸院如彼州縣允從即就院如法禮請專使先看知事計會訖上堂頭人事茶罷便賫書疏咨聞禮請殷勤三請乃可受之法雲圓通禪師每受請必待三回遣使方受之尊宿受疏受疏之法如是見住持人先於方丈三請如有允意鳴鼓集衆更須辭讓不得已受之香薰顯示當有法語請維那宣讀升座舉揚畢下座與知事首座大衆賀謝兩展三禮賀辭云榮遷上剎喜動叢林祖師增輝人天共慶下情無任欣躍之至謝辭云叩膺請命有玷宗風仰愧諸天俯慚大衆如所請非見住持人先詣寮三請如有允意住持人升座舉白同衆人禮請然後禮拜住持人受疏如未經出世本院專使預備法衣一條宣疏罷專使呈獻香薰顯示披之當有法語如有已經出世即不須也然後指法座上座當有法語舉揚畢下座禮謝住持人或大展九拜或兩展三禮謝辭云一生取辨仰愧先賢三請既勤難違上命下情無任惶懼激切之至賀詞云囊錐已露花雨難逃幸是當仁伏惟歡慶次與知事首座大衆賀謝兩展三禮謝云叨膺請命有玷宗風仰荷吹噓不任感激賀詞云喜受人天之請榮添佛祖之光下情無任欣躍之至次第巡寮一兩日專使特為新住持人先呈茶榜次日置食點茶臨行升堂別衆小參之禮各逐方宜如見住侍人受請切不可將院中受用之物衷私隨行如有錢穀交加須是交割分明亦不得將院中得力行者移帳前去亦不得多受本院送路如和會參隨亦不得令本院失事然後請先馳兄弟并具一行合用書信先馳中選一人下官員檀越謝書并到狀兩人歸院打疊新住持人於起程之日同大衆打包離院住持人在大衆後專使并相送僧俗在新住持人後尊宿入院入院之法新住持人打包在前參隨在後如遇迎接或下笠斂杖問訊或右手略把笠緣低身或請就座茶湯但卸笠倚杖就坐不可卸包於尊宿問訊云路次未得具威儀禮拜於官員祇揖云路次衣服不便且望不罪入院於三門下燒香當有法語就僧堂前解包了後架洗腳入堂參聖僧燒香同參隨大展三拜同巡堂一匝維那請就位觸禮三拜挂搭訖新住持人先到大殿次土地堂次真堂並聲法事燒香知事請入方丈據座顯示訖知事禮謝略與人客相見須臾鳴鼓升堂次第人事賀謝如解結之禮賀詞云伏承象駕光據法筵下情無任喜躍之至謝詞云自慙非器竊據名藍下情無任惶恐之至至晚小參三日為準次日早晨看官次第人事擇日開堂才到人事稍定便合特為專使參隨并迎請官員施主及前資勤舊相伴參隨人禮須和會未入院前令先馳別打疊一寮安置候定疊散入請寮尊宿住持代佛揚化表異知事故云傳法各處一方續佛慧命斯曰住持初轉法輪命為出世師承有據乃號傳燈得善現尊者長老之名居金粟如來方丈之地私稱灑掃貴徒嚴淨道場官請焚修蓋為祝延聖壽故宜運大心演大法薀大德與大行廓大慈悲作大佛事成大利益權衡在手縱奪臨時規矩準繩故難擬議然其大體令行禁止必在威嚴形直影端莫如尊重量才補職略為指蹤拱手仰成慎無徹肘整肅叢林規矩撫循龍象高僧朝晡不倦指南便是人天眼目尊宿遷化如已坐化置方丈中香花供養以遺誡偈頌貼牌上挂靈筵左右於衆尊宿中請法屬一人為喪主如無法屬則請自餘住持尊宿然後修寫遺書報官員檀越僧官鄰近尊宿嗣法小師親密法屬請僧分頭下書三日後入龕如亡僧法入龕時請尊宿一人舉靈座當有法語法堂上西間置龕東間鋪設臥牀衣架隨身受用之具法座上挂真法堂上用素幕白花燈燭供養之物真前鋪道場法事小師在龕幃之後幕下具孝服守龕法堂上安排了喪主已下禮真訖然後知事頭首孝子大衆與喪主相見喪主已下次第相慰如有外人弔慰外知客引到堂上內知客引於真前燒香致禮竟與喪主知事首座相看卻來幕下慰孝小師然後卻來與喪主茶湯外知客送出如有致祭於真前陳設若不將帶讀祭文人來即本院維那書記代讀送葬之儀合備大龕結飾臨時并真亭香亭法事花幡起龕之日本院隨力作一大齋襯施重於尋常至時請尊宿一人舉龕當有法語孝子并行者圍繞龕後次喪主已下送孝人及本院大衆等相繼中道而行官員施主在大衆左右並行尼師宅眷隨在末後送葬若焚化即請尊宿一人舉火當有法語若入塔即請尊宿一人下龕當有法語又請尊宿一人撒土當有法語然十念等如亡僧之禮本院應散念佛錢歸院請尊宿一人挂真當有法語且就寢堂內安排喪主已下禮真相慰而散知事頭首孝子等早暮赴真前燒香及齋粥二時隨衆供養候新住持人入院有日則移入真堂其入龕舉龕下火下龕撒土挂真並有乳藥喪主重有酬謝院門稍似定疊如上尊宿諸人須當特為陳謝次第商量請新住持人知事下狀申明諸院長老及僧官保明申上如所保未允衆情即本院知事赴官申訴別行定奪如官中專行及令本院委保亦須及早行遣免本院久闕住持之人退院如是年老或有疾病或因事故不得顧戀住持預先打疊方丈衣鉢及準備包杖如常住錢物僧供之類須與知事結絶文曆分明及堂頭公用合行交割亦具文曆抅管用院印印押通知事知之別請一人看守方丈并主管物色在侍者寮安下如方丈衣鉢稍多未退已前估唱齋僧及支撥錢物入常住防有侵損互用之過退院行李唯隨身依物道具而已如行李太多即動人譏笑或別生謗議金銀匹帛係稅及禁榷之物並不宜帶行亦不得與官員附帶書信及菴子及不得預修退居院如欲出本州界遠去即預先方便擘劃判憑若諸事已辨即令侍者或小師一人下退院狀住持人隨後避本院前去或在別寮安下如退院後諸處為客安下只宜將帶侍者行者各一人不得太多恐人家院舍動念自餘精粗隨衆不得于預院事及輕議主人知事頭首長短亦不得言及舊日住持所有勞績及一切點胸擔版之事如經過所在主人請升座或小參受與不受臨時如非主人所舉及知事大衆禮請不得擅便受人入室如已退本院不宜常在左右及舊院安下人情極不穩順宜深戒之如病患年老不可去即隨意無害
