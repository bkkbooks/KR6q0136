body:
  text: 龜鏡文夫兩桂垂陰一華現瑞自爾叢林之設要之本為眾僧是以開示眾僧故有長老表儀眾僧故有首座荷負眾僧故有監院調和眾僧故有維那供養眾僧故有典座為眾僧作務故有直歲為眾僧出納故有庫頭為眾僧主典翰墨故有書狀為眾僧守護聖教故有藏主為眾僧迎待檀越故有知客為眾僧召請故有侍者為眾僧看守衣鉢故有寮主為眾僧供侍湯藥故有堂主為眾僧洗濯故有浴主水頭為眾僧禦寒故有炭頭爐頭為眾僧乞丐故有街坊化主為眾僧執勞故有園頭磨頭莊主為眾僧滌除故有淨頭為眾僧給侍故有淨人所以行道之緣十分備足資身之具百色見成萬事無憂一心為道世間尊貴物外優閑清淨無為眾僧為最迴念多人之力寧不知恩報恩晨參暮請不捨寸陰所以報長老也尊卑有序舉止安詳所以報首座也外遵法令內守規繩所以報監院也六和共聚水乳相參所以報維那也為成道故方受此食所以報典座也安處僧房護惜什物所以報直歲也常住之物一毫無犯所以報庫頭也手不把筆如救頭燃所以報書狀也明窓淨案古教照心所以報藏主也韜光晦迹不事追陪所以報知客也居必有常請必先到所以報侍者也一瓶一鉢處眾如山所以報寮主也寧心病苦粥藥隨宜所以報堂主也輕徐靜默不昧水因所以報浴主水頭也緘言拱手退己讓人所以報炭頭爐頭也忖己德行全缺應供所以報街坊化主也計功多少量彼來處所以報園頭磨頭莊主也酌水運籌知慚識愧所以報淨頭也寬而易從簡而易事所以報淨人也是以叢林之下道業惟新上上之機一生取辨中流之士長養聖胎至如未悟心源時中亦不虗弃是真僧寶為世福田近為末世之津梁畢證二嚴之極果若或叢林不治法輪不轉非長老所以為眾也三業不調四儀不肅非首座所以率眾也容眾之量不寬愛眾之心不厚非監院所以護眾也修行者不安敗群者不去非維那所以悅眾也六味不精三德不給非典座所以奉眾也寮舍不修什物不備非直歲所以安眾也畜積常住减尅眾僧非庫頭所以贍眾也書狀不工文字滅裂非書狀所以飾眾也几案不嚴喧煩不息非藏主所以待眾也憎貧愛富重俗輕僧非知客所以贊眾也禮貌不恭尊卑失序非侍者所以命眾也打疊不勤守護不謹非寮主所以居眾也不閑供侍惱亂病人非堂主所以恤眾也湯水不足寒暖失宜非浴主水頭所以浣眾也預備不前眾人動念非爐頭炭頭所以向眾也臨財不公宣力不盡非街坊化主所以供眾也地有遺利人無全功非園頭磨頭莊主所以代眾也懶墯併除諸緣不具非淨頭所以事眾也禁之不止命之不行非淨人所以順眾也如其僧眾輕師慢法取性隨緣非所以報長老也坐臥參差去就乖角非所以報首座也意輕王法不顧叢林非所以報監院也上下不和鬪諍堅固非所以報維那也貪婪美膳毀訾麁飡非所以報典座也居處受用不思後人非所以報直歲也多貪利養不恤常住非所以報庫頭也事持筆硯馳騁文章非所以報書狀也慢易金文看尋外典非所以報藏主也追陪俗士交結貴人非所以報知客也遺亡召請久坐僧眾非所以報侍者也以己妨人慢藏誨盜非所以報寮主也多嗔少喜不順病緣非所以報堂主也桶杓作聲用水無節非所以報浴主水頭也身利溫暖有妨眾人非所以報爐頭炭頭也不念修行安然受供非所以報街坊化主也飽食終日無所用心非所以報園頭磨頭莊主也涕唾牆壁狼藉東司非所以報淨頭也專尚威嚴宿無善教非所以報淨人也蓋以旋風千匝尚有不周但知捨短從長共辨出家之事所冀師子窟中盡成師子旃檀林下純是旃檀令斯後五百年再覩靈山之會然則法門興廢繫在僧徒僧是敬田所應奉重僧重則法重僧輕則法輕內護既嚴外護必謹設使粥飰主人一期主化叢林執士偶爾當權常宜敬待同袍不得妄自尊大若也貢高我慢私事公酬萬事無常豈能長保一朝歸眾何面相看因果無差恐難迴避僧為佛子應供無殊天上人間咸所恭敬二時粥飰理合精豐四事供須無令闕少世尊二千年遺蔭蓋覆兒孫白毫光一分功德受用不盡但知奉眾不可憂貧僧無凡聖通會十方既曰招提悉皆有分豈可妄生分別輕厭客僧旦過寮三朝權住盡禮供承僧堂前暫爾求齋等心供養俗客尚猶照管僧家忍不逢迎若無有限之心自有無窮之福僧門和合上下同心互有短長𮞏相蓋覆家中醜惡莫使外聞雖然於事無傷畢竟减人瞻仰如師子身中蟲自食師子肉非外道天魔所能慶也若欲道風不墜佛日常明壯祖域之光輝補皇朝之聖化願以斯文為龜鏡焉坐禪儀盡學般若菩薩先當起大悲心發弘誓願精修三昧誓度眾生不為一身獨求解脫爾乃放捨諸像休息萬事身心一如動靜無間量其飲食不多不少調其睡眠不節不恣欲坐禪時於閑靜處厚敷坐物寬繫衣帶令威儀齊整然後結跏趺坐先以右足安左䏶上左足安右䏶上或半跏趺坐亦可但以左足壓右足而已次以右手安左手上左掌安右掌上以兩手大拇指面相拄徐徐舉身前欠復左右搖振乃正身端坐不得左傾右側前躬後仰令腰脊頭項骨節相拄狀如浮屠又不得聳身太過令人氣急不安要令耳與肩對鼻與臍對舌拄上腭唇齒相著目須微開免致昏睡若得禪定其力最勝古有習定高僧坐常開目向法雲圓通禪師亦訶人閉目坐禪以謂黑山鬼窟蓋有深旨達者知焉身相既定氣息既調然後寬放臍腹一切善惡都莫思量念起即覺覺之即失久久忘緣自成一片此坐禪之要術也竊謂坐禪乃安樂法門而人多致疾者蓋不善用心故也若善得此意則自然四大輕安精神爽利正念分明法味資神寂然清樂若已有發明者可謂如龍得水似虎犇山若未有發明者亦乃因風吹火用力不多但辨肯心必不相賺然而道高魔盛逆順萬端但能正念現前一切不能留礙如楞嚴經天台止觀圭峰修證儀具明魔事預備不虞者不可不知也若欲出定徐徐動身安詳而起不得卒暴出定之後一切時中常作方便護持定力如護嬰兒即定力易成矣夫禪定一門最為急務若不安禪靜慮到這裏總須茫然所以探珠宜靜浪動水取應難定水澄清心珠自現故圓覺經云無碍清淨慧皆依禪定生法華經云在於閑處修攝其心安住不動如須彌山是知超凡越聖必假靜緣坐脫立亡須憑定力一生取辨尚恐𩥙駞況乃遷延將何敵業故古人云若無定力甘伏死門掩目空歸宛然流浪幸諸禪友三復斯文自利利佗同成正覺自警文神心洞照聖默為宗既啟三緘宜遵四實事關聖說理合金文方能輔翼教乘光揚祖道利他自利功不浪施若乃竊議朝廷政事私評郡縣官寮講國土之豐凶論風俗之美惡以至工商細務市井閑談邊鄙兵戈中原𭁵賊文章伎藝衣食貨財自恃己長隱佗好事揄揚顯過指摘微瑕既乖福業無益道心如此游言竝傷實德坐銷信施仰愧龍天罪始濫觴禍終滅頂何也眾生苦火四面俱焚豈可安然坐談無義一百二十問敬佛法僧否求善知識否發悟菩提心否信入佛位否古今情盡否安住不退否壁立千仞否齋戒明白否身心閑靜否常好坐禪否絕默澄清否一念萬年否對境不動否般若現前否言語道斷否心行處滅否見色便見心否聞聲便見性否達磨面壁否龍牙隱身否千手千眼否古佛與露柱相交否至道無難否似地擎山否迷逢達磨否庵內人不見庵外事否南山起雲北山下雨否師子奮迅否慈悲開示否護法亡軀否古教照心否三觀澄神否遊戲三昧否普門示現否深窮六相否洞照十玄否融六位圓因否即十身果海否會信首丈殊否入位後普賢否威儀詳定否語言端審否心口相應否不自讚毀他否能退己讓人否能知人功德否不說人罪過否不惡難問否不好戲笑否常樂默然否不欺暗室否處眾如山否常行謙下否和合無諍否立事得中否樂聞善言否不惡直言否安受苦忍否能忍惡罵否能降喜心否不追陪人事否不懶墮焚修否不侵損常住否不互用財物否不蓄金銀財寶否不藏書𦘕器玩否不從人乞貸否知不蠶而衣否知不耕而食否知不戰而安否受用知足否能節飲食否行施不倦否受施不貪否衣鉢無餘否不為利說法否不求人愛敬否不貪利弟子否不希求名譽否不近王臣否不恃作形勢否不干預公家否謹畏王法否不占相吉凶否不親厚女人否不妬賢能否不嫉他勝否不輕貧賤否護人意根否不惱害有情否常行放生否常念護生否敬老慈幼否安養疾病否憫念牢獄否能惠飢寒否遠悲收戰否等親華夷否報王臣統治恩否答父母生育恩否酬師友訓導否念檀越供給恩否懷親知贊助恩否顧給侍勤勞恩否思龍天荷護恩否知兵將守禦恩否恤諸天衰惱否憫人間八苦否傷修羅鬪戰否悼鬼趣幽愁否哀旁生癡暗否痛地獄悲酸否怨親平等否普敬如佛否普愛如父母否誓度無餘否三時點撿否一生事辦否得人自在否證大涅槃否誡沙彌未披剃前准備五條正合披五條縵衣裙衫鐼子鞋靸先受五戒次受十戒切不得著七條九條及用頭鉢坐臥僧床與大僧雜處如禮見大僧應稱某是沙彌恣煩大僧答拜既受沙彌戒法應須憶念遵行若犯沙彌戒即不得六僧戒常應精勤禮念志求大戒及讀誦沙彌戒經書填狀式某院童行姓某右某年若干本貫某州某縣某鄉人事或郭下人事昨於某年某月某日到院出家有父母即云父母送到出家禮住持僧某為師今買到如客處買到即稱買到客人某甲名下某處某字號空名度牒一道欲乞書填為僧竝無諸般違碍請申狀云云年月日具前位姓某狀
