body:
  text: 勸檀信在家菩薩先當事佛務極嚴謹永斷葷酒堅守齊法於諸欲染誓不擬犯親近知識發明己見隨其悟入如理修行若初心之士未能頓除葷酒且食早素一月之間已能減半久習淳熟自能永斷長齊及欲障厚者先且奉行五戒然後進登菩薩清淨大戒若未能親近知識者但應讀誦大乘助發正見若未悟摩訶般若者但依佛語修行時中亦不虗棄學般若菩薩應當勤發願云南無佛南無法南無僧願身心安樂進道無魔般若光中念念之間常以般若發悟一切衆生普願一切衆生頓悟摩訶般若波羅密多同成無上正遍知覺齊僧儀齊僧之法以敬為宗但依僧次延迎不得妄生輕重凡夫肉眼誰辨聖賢誤起輕心定招薄福或有親臨梵剎就設齊筵此人來世之中必感自然之報然而清淨福田理應專一不宜多招賓客雜亂正因設携親友隨喜勝緣但可飲食均平請各隨衆不可容居高位倍享精豐僧在下流隨緣淡薄設齊之日亦應慎護三業不得飲酒食肉若能如此福德無量百丈規繩頌按百丈大智禪師以禪宗肇自少室至曹溪已來多居律寺雖則別院然於說法住持未合軌度故常爾介懷乃曰祖宗之道欲誕布化冀其將來永不泯者豈當與諸部阿笈摩教為隨行耶舊梵語阿含新云阿笈摩即小乘教也或曰瑜伽論瓔珞經大乘戒律何不依隨耶師曰吾所宗非局大小乘非異大小乘當博約折中設於制範務其宜也於是創意別立禪居昔時居律寺別院啓禪門大智禪師後方知祖道尊凡具道眼有可遵之德者號曰長老如西域道高臘長呼須菩提等之謂也既為化主即處于方丈同淨名之室非私寢之室也道德兼隆者方能嗣祖宗須菩提雅號無垢稱家風不立佛殿唯搆法堂者表佛祖親受當代為尊也入門無佛殿升座有虗堂即此傳心印當知是法王所裒學衆無多少二無高下盡入僧堂中依夏次安排設長連牀椸架掛搭道具學徒無衆寡高下入僧堂道具安椸架周圍設廣牀臥必斜枕牀脣右脅吉祥睡者以其坐禪既久略偃息而已具四威儀也斜枕牀脣臥安祥右脅眠暫時調四大敷坐復安禪除入室請益任學者勤怠或上或下不拘常準入室參玄理摳衣請益時任他勤與怠上下勿常儀其闔院大衆朝參夕聚長老上堂升座主事徒衆鴈立側聆賓主問酬激揚宗要者示依法而住也夕聚晨參處師徒集會時升堂須鴈立側耳聽玄微齊粥隨宜二時均平其節儉者表法食雙運也行普請法者上下均力也置十務謂之寮舍每用首領一人管多人營事令各司其局也主飰者自為飯頭主者自為領餘皆倣此法食宜雙運精粗且過時諸頭分局務普請貴勻齊或有假號竊形混于清衆竝別致喧撓之事即堂司維那撿舉抽下本位掛搭擯令出院者貴安清衆也不信天真佛來為假比丘即時抽掛搭去矣莫回頭或有所犯即須集衆以拄杖杖之焚燒道具逐從偏門而出者示耻辱也犯重焚衣鉢應當集衆人山藤聊示耻驅擯出偏門詳此條制有四種益一不污清衆生恭信心故三業不善不可共住準律合用梵壇治之當驅出院清衆既安恭信生矣二不毀僧形徇佛制故隨宜懲罰得留法服後必悔之三不擾公門省獄訟故四不泄于外護綱宗故四來同居凡聖孰辨且如來應世尚有六群之黨況今像末豈得全無向見有輩但見一僧有過便雷同譏誚殊不知以輕衆慢法其損甚大今禪門若無妨害者宜依百丈叢林格式量事區分雖立法防姦未為賢士然寧可有法而無犯不可有犯而無教推百丈禪師護法之益其為大矣擯逐成何益安禪不毀僧公門無獄訟祖席播嘉聲今禪門別行由百丈之始略敘大要遍示後來學者貴不忘其本也諸方自古共遵所濟衆務急救弊之要者凡三十件用示方來切在詳稟確志維衛永成軌範俾醜迹穢聲無流外聽不唯叔世禪林之光茂亦乃護法之一端耳其事件名數條牒如左百丈存綱領諸方酌古今始終三十事一一護叢林一堂司凡掛搭僧人須依六念上戒臘資次安掛或寺門主執及化導回只可移上三五位如經坐次已高不可更移或監收及小頭首不用移改或諸方僧或輔弼叢席道德名望者先掛搭畢後白住持人高低移上切在臨時安僧排戒臘執事略推移小小諸頭首還應似舊時輔弼叢林者名高道德高到時先掛搭方稟住持人一參時巡堂須依掛搭次第入堂及晚參巡堂罷各歸寮舍問訊後却來展單晚參逢念誦寮舍暫須還問訊竝湯罷回來却展單一新到三日內且於堂中候赴茶湯未可便歸寮舍及粥後偃息須當早起免見堂中尋請借問喧動清衆初來三日內祇候赴茶湯粥後宜先起時中且在堂一新到山門時特為點茶其禮至重凡接送盞槖切在恭謹祇揖上下不可慢易有失禮儀山門如特為禮意重於山趂赴依時節身心莫等間一請假遊山只可半月或過限者須呈祠部再守堂儀如違則準院施行請假遊山者還將半月期過時重掛搭依舊守堂儀一新到掛搭後或起他遊須候十五日堂儀滿仍白堂司方可前去貴消落牀曆堂儀經半月起必報堂司所貴消牀曆如今去不辭一遇開啓聖節道場或欲起離雲遊須一上殿看經方可前去無自輕易福田衣下客自古免征徭不是因祈禱何緣等聖朝叢林逢聖節輪次預看經事訖方前去酬恩勿自輕二時齊粥須依掛搭資次坐不得過越高位仍須候長版鳴方可下鉢食時不得匙筯刮鉢作聲動其無福鬼神生飢渴想罪不可量切宜低細巡堂依掛搭粥飯亦如之鵽鵰獼猴象猶能識禮儀下鉢依時節安排應上肩寅時長版後三下午齊前粥飯宜低細無令鉢有聲鬼神生熱惱自損亦非輕一掛搭後臥具衣服常須齊整非己單席不得擅意自移几開單切須低細亦不得於床上立地拽揲被服及不得背面上床自己衣單下尋常要整齊他人安被處不得擅遷移欲上長連榻常應面聖僧展單心欲細開被手宜輕後夜聞開靜方容疊寢衣莫於床上立禮度太乖違一臥袈裟不得推搭版頭及聖僧龕所只得揲以淨巾襯蓋安於枕前次安上衫等衣佛制離衣宿安排向枕前版頭竝𣗈上疑誤涉瓜田莫卸裙衫睡堂中免衩衣先賢令解帶權且為初機一粥前竝放參後不得開函匱及堂中不得聚頭說話不得坐靠版頭如出三門外遊處及爐中向火不得高聲語笑及撥火等或遇下帳簾須當候鐘鳴須至整齊放參同下帳鐘動各垂簾及早開函匱當知避衆嫌堂下勤宴坐廊下少間遊第一宜深戒全身靠版頭經行由靜默況復在圍爐撥火竝間話知君行業粗一後夜及版鐘未鳴或先起切須低聲揭簾出入不得拖拽鞋靸及洗面處不得高聲涕唾敲礚桶杓驚動清衆涕唾拖鞋履清宵必共嫌輕輕拈桶杓欵欵放門簾一掛牌接官須至齊赴貴令整肅生外護心尊官臨梵剎迎送動禪林去就應齊整令生外護心一凡普請處著五條衣闔寮齊赴除寮主外及至普請處不得聚頭說話普請除寮主應當掛五條作時須靜默不得閙嘈嘈一諸寮舍命寮主者須掛搭前後輪次主執一月日貴上下均齊彼此承奉不得雜亂免有橫譏若命寮中主須依掛搭推不唯消謗議所貴在均齊一尊殿上只可焚香瞻禮不可倚靠欄楯聚頭語笑或披作衣時不得上殿而過免有輕觸聖像殿塔焚修地龍神暗護持憑欄竝語笑損福定無疑梵語安他會經言作務衣若從尊殿過崇奉禮還虧一諸寮舍只得寮主及寮中上座一人寮內睡臥如堂司請人睡不在此限伴寮唯首座此外聽堂司大衆衣盂地間人總不宜一堂中及寮內去失衣物等須具衣物色數時節處所聞白主首驗認有無虗實如情理重者白堂司集衆搜堂及寮犯者公行妄者弃衆衆中如去失色件要分明物重須搜撿情輕事可評一浴時聞鼓聲須得早赴遲則有妨行者澡洗第一通鼓第二通鼓衆僧入浴第三通鼓山門主執者浴煞鼓行者浴無令混雜浴室內須用浴巾蓋體各避衆眼兩會堂僧浴三通執事來淨人聞煞鼓次第勿相乖浴久妨清衆來遲礙淨人裙衫須蓋體語笑莫紛紛一諸寮舍不得高聲讀誦經典竝間雜文字自己案分禪䇿文字常蓋齊整或把針剃頭剪紙合藥或曬鞋靸觸衣浴具皆於屋後僻處仍逐時打疊免有狼藉衆人處所几案宜瀟灑看常貴悄然慎言如不語處衆似居山把針竝合藥剪紙剃頭時作務喧清衆寮中總不宜㬠鞋安浴具乃至觸衣裳僻處竝寮後收時要審詳一聖衆內或有盜竊酒色及鬪諍污衆喧亂不律等事皆集衆弃逐出院不從即聞公盜財竝鬪諍酒色污僧倫速遣離清衆容留即敗群一頭首等不安輕可只於寮中將息三日如病重者當白維那移入延壽寮疾病經三日須歸延壽堂叢林知事者到此勿倣徨一堂內清衆如不充主首掌握山門但隨衆作務齊粥參請外當自省己各守分業積德隆道用光叢席不可已外干管院務擅自更張生事走扇是非有撓清衆無令安靜違者即准院令三條椽下客自了一身休幸有僧知事何須強出頭一堂中凡坐時不得臨床前須斂衣服近後穩坐離牀脣五寸貴無參差發瞻敬意莫據牀脣坐衣裳直下垂應留展鉢地前後勿參差一送亡僧不可語笑作樂宜懷追慘恐他道業未明虗生浪死各自省究或估唱衣物之時本與清衆結緣共破慳貪切不可輕唱貴賣剝削餘直非為十方義聚收唱衣錢除支使外均俵清衆看經或暫到見送及唱衣三分得一分或施主看經錢亦准此送死宜追慘防伊道未成遺財津送外分俵為看經為破慳貪業僧亡必唱衣標心圖世利不是出家兒見估亡僧物三分得一分看經如後到折利亦同論一首座凡早晚坐堂竝早參及二時齊粥須至先赴堂或聖衆參差不合宜事粥前大衆集當須告白勸勉貴得整齊首座為標準朝晡合坐堂早參竝粥飯先到是尋常欲白堂中事寅朝衆集時一言如當理何必在繁辭一知事職局臨事須以至公各守法度力荷叢席至於內外事迹或未深通曉須當上下通議早晚參及動衆所如急幹竝須齊赴貴率於衆凡行者人工有過但晚參庫堂內指約戒勵或遇官客齊粥二時不得行遣慮動衆念職事宜通曉公清務保任赤心弘大衆竭力荷叢林事有疑難處商量勿異心相和如水乳握土變黃金庫堂懲有罪須是晚參時粥飯竝官客聞之必皺眉一主首分司列局主執山門大小事務各有自來規式條目當修本局務成事業不可局外生事貴當安靜無至亂倫叢林分主首各自有司存守己都無事侵權即亂倫一五日一參三八日晚參奉為四恩三有念誦每月六為准念誦逢三八升堂五日期昔賢垂懿範後代莫相違一住持人每遇月旦須巡寮舍安存清衆詢及寮中或有缺闕動用等及時應副凡二時齊粥住持人赴堂兩通鼓聲堂前鍾鳴入堂如聲絶入堂即當首座撿舉或動衆普請及送亡僧估唱衣物等竝須躬赴如違盡當撿舉仍無宦客乃無疾病須當赴堂不得別置粥食山門知事亦皆准此自古巡寮法安存衆比丘有無應借問應副莫遲留兩會厨前鼓來時莫太遲堂前鐘響處便是入堂時唱衣竝普請粥飯送亡僧第一宜親赴叢林事不輕住持竝執事粥飯勿乖常無病無官客應須總赴堂前件規矩先德垂範十方清衆宜各遵行越州比丘善祥同集溫州比丘法貴校勘真定比丘法深管勾文林郎寧國軍節度推官吳時校勘朝奉大夫權知邵武軍管勸農公事周玭再校正朝請大夫新知郴州軍州主管學事兼管內勸農營田事借紫金魚袋虞翔刊行新添濾水法並頌菩薩戒經十八種物中濾水囊第九常隨其身如鳥二翼頌曰頭陀結夏遊方日濾水囊皆不可離恰似飛禽生兩翼東西南北自相隨大集經云畜生身細猶如微塵十分之一大者百萬由延故知濾水是大慈悲乃成佛之因也頌曰十分去微蟲取一教中將喻水蟲身殷勤濾水存悲濟便是將來成佛因菩薩多論云舍利弗以淨天眼見水中空中蟲如水邊沙器中粟無處不有遂斷食佛言肉眼所見濾羅所得義淨三藏放生儀云濾食水之人來世當生淨土頌曰器中粟米水邊沙空水微塵量不差濾水若能依聖制寶蓮金地樂無涯鼻奈耶律說二比丘欲向佛所一人不飲蟲水渴死生天見佛得道頌曰比丘來見法中王忘却將行濾水囊寧死不虧蟲水戒剎那成道澄真常一比丘飲水後至佛所佛問其故已脫憂多羅僧示黃金身云汝癡人用觀是四大身為幼成臭處其見法者即見我身頌曰飲水傷蟲行業疏可憐同伴不同塗雖然得到祇園會只見黃金丈六軀宣律師云濾水袋物雖輕小所為極大出家慈濟厥意在此今上品高行尚飲用蟲水況諸不肖為可言哉頌曰濾羅雖小事非輕的的真慈護有情大覺世尊明有敕上流何故不遵行義淨三藏寄歸傳云西方用上白氎冬夏宜將密絹或以米搡或可微煮又六月七月其蟲更細不同餘時生絹十重蟲亦直過樂護生者理應念取緻練作袋濾之方盡頌曰細氎作囊長一肘西天濾水舊家風此方緻練方如法薄絹生疏盡不中寄歸傳云可取熟絹笏尺四尺挽褶兩頭刺使相著兩角施帶兩畔橫杖張開尺六兩邊繫柱下以盆承傾時罐底須入羅內水既足已即可翻羅兩人各捉一頭令入放生器內上以水洗三遍外邊更以水淋度無蟲方罷頌曰兩邊羅樣要寬容攙攝縫來繫柱中汲器竝須連底瀉翻時洗蕩要全功四分律云作濾水囊如杓形若三角若作宏槨若作漉瓶寄歸傳云河池之處或可安棬用陰陽瓶權時濟事或作瓦盆子羅亦是省要西方寺家多月銅作頌曰羅樣安棬或作瓶任從三角杓頭形銅盆瓦缶竝宏槨得用隨緣到處精寄歸傳云傾水之時罐底須入羅內如其不爾隨水落墜地墮盆還不免殺頌曰濾水僧童欵欵傾細蟲迷悶可傷情若教羅外遺涓滴不免依前是殺生薩婆多論云今持戒審悉者漉水竟著淨器中向日群視故有者如前更濾頌曰濾已應須子細觀有蟲重濾更重看直須盡淨方隨意使用如今信者難寄歸傳云亦既天明先觀瓶水可於白淨銅盞或螺杯漆器中頎取掬許安竪甎上或可別作觀水之水以手掩口良久視之或於盆中看之亦得蟲若毛端必須存念若見蟲者倒瀉瓶中更於餘水再三滌器無蟲方罷頌曰銅盞螺杯漆器通日中觀水驗微蟲應須洗滌存方便始盡毗尼救物功義淨三藏述護命放生儀說放生器甚詳器以銅鐵瓦木為之底下安細以雙繩放之放下至水繩令覆再三下濯方牽出竝乞食時以小銅瓶子穿在左臂以衣蓋之宣律師云損生妨道者由不畜漉水袋縱畜而不用雖用而不漉蟲雖瀉而損蟲命寄歸云在瓶口之上翻羅未曉放生之器設令到水蟲死何疑頌曰放生器下安雙細到水牽繩勢自翻渴死羅中真可罪翻羅井上亦無端僧祇律云濾已蟲水著器中還送來處瀉中若來處遠者近有池七日不消者以蟲著中義淨三藏云若井深處或可別為盆貯或可送往河池瀉水竟時還濾滌器奧法師菩薩戒鈔既濾得已別置一放生盆而令安詳置之於水以護生命頌曰井遠泉深若厭煩護生宜用放生盆安詳瀉向常流水俟入池中粗可論薩娑多論云如法濾水置一器中足一日用寄歸傳云凡是經宿之水且不看者有蟲無蟲用皆招罪頌曰濾水要期終日用來朝重濾恐重生因思九夏多螻蟻舉足常應觀地行寄歸傳云時有作小圓羅才受一升兩合生疏薄絹元不觀蟲懸著鉢邊令他知見無心護命日日招愆師弟相承用為傳法誠哉可歎頌曰去聖時遙律行衰小羅疏絹事堪悲鉢邊掛去從人見堂上懸來備禮儀奧法師菩薩戒經鈔云今見寺中常以粗布為之乖角極甚頌曰粗布縫羅釜上安細蟲微命剎那間鑊湯不是天然熱因果門中事好還義淨三藏云神州之地四百餘城出家之人動有萬計於濾水事存心者寡頌曰神州四百有餘城多少名圓德行僧赴火墮崖人易得濾蟲觀水却難能義淨三藏云設使學通三藏坐證四禪鎮想無生證心空理若不護命依教奉持終亦未免佛所呵責十惡初罪誰代受之頌曰妙入三空談般若功圓八定證禪那不於濾水存悲願未免如來一例呵寄歸傳云若知寺不濾水不合餐食渴死長塗足為龜鏡僧祇律云若施主請比丘食應問濾水未若未濾者自著濾之頌曰寺家不濾厨中水僧飯由來不合餐俗舍有齊應借問濾時還復自家看菩薩戒經十重戒中殺戒最居第一言菩薩以慈為本衆生以命為貴也又四分律云九十波逸提用蟲水戒第九十飲蟲水戒第六十二也五分律云墮用蟲一一隨宣律師云性戒無懺終須酬報義淨三藏云斯之罪咎欲如之何直知束手泉門任他處分經云殺生之人當墮地獄餓鬼畜生設得為人短命仍多病故也頌曰殺戒偏居十重前一蟲一墮理照然粗心飲用無慚愧束手泉門被業牽義淨三藏云且如有屠牽羊入寺不過數口放作長生衆共聚看彈指稱善寧知房內用水日殺千生頌曰盡歎屠兒有道情施羊僧寺作長生不知房內日用水殺業無過罪不輕元豐中衛州壇山六度寺濟律師增戒會不曾濾水太間和尚云雖云增戒却是增罪慈悲之言誰不警悟也頌曰記得壇山增戒會濟師全闕濾蟲緣太間和尚深呵責聚集僧徒長罪𠎝義淨三藏云懷生者皆愛其生上通賢智有死者咸畏其死下洎昆蟲佛以大悲宣揚法化於護生處極致殷勤是佛弟子理應隨作頌曰任是昆蟲須惡死假如賢聖亦全生若推此意觀蟲水何慮慈悲行不成古云吾觀一滴水八萬四千生凡夫目不見天眼自分明頌曰蠢動皆含佛性靈再三撈漉是修行君看一掬尋常水何啻千生與萬生傳燈録第五智巖禪師未出家時曾為郎將雖在軍陳之中弓上常懸濾水囊也頌曰昔時郎將在沙場弓上猶懸濾水囊為報金田諸上士出家悲濟是尋常奧法師云印度法則僧徒出入乃至乞食漉袋常須隨身此物此方停來久矣苦哉苦哉故律云寧可忍渴死終死不飲蟲水何以故一飲水時損無量命一日飲蟲水罪過屠一生特須誡之也又賢愚經載尸毗國王割肉救鷹金光明經說薩埵太子投身飼虎頌曰傷嗟濾水停來久珍重吾曹勉力行飼虎餧鷹猶不𮨇一羅何惜為衆生涅槃經喻乘浮囊渡海如持戒欲出生死義淨三藏云若能依教作者現在得長命果報是知沙彌救蟻不過數萬尚感長命況於濾水能護無數衆生也殺生既墮三惡道護生應得人天善趣明矣頌曰欲趣菩提之道場濾囊今日是浮囊人間天上莊嚴福此世他生壽命長宣律師云水中細蟲無數同水塵量故涅槃經云塵耶蟲耶此言信矣取緻𬗠作袋濾也萬盡義淨三藏云依教作者來世當生淨土又云釋迦末法共結慈念之因彌勒初成俱證無生之果頌曰擾擾塵蟲竟莫分好修因果濟沈淪龍華會上無生記淨土光中不死人凡濾水者應願諸蟲往生淨土當來作佛非但一朝免死頌曰菩薩興悲寄遠懷濾生當願託蓮臺他年淨土微塵佛盡是羅中漉出來古清涼傳下卷有清信士不詳其氏諱年可二十衣服襤褸自云從抱腹山來識者相傳云每在并州巡市乞丐以所乞得造濾水囊可七八寸造訖隨處勸人令用凡造數千餘信士神容簡暢語論入微皆謂不測之人也頌曰清涼信士行悲憫乞絹縫羅滿數千隨乞隨縫隨布施勸人同結濾生緣世云濾羅難安多衆宗賾崇寧元年於洪濟院厨前井邊安大水檻上近檻唇別安小檻穿角傍出下安濾羅傾水之時全無迸溢亦五大衆沾足浴院後架倣此僧行東司亦皆濾水出家之本道也後住長蘆諸井濾水二十餘處常住若不濾水罪歸主執之人普冀勉而行之新添濾水法竝頌終
