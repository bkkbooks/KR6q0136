body:
  text: 上堂如遇公界上堂早參粥罷不放參天明開靜首座率大眾坐堂聞一通鼓首座大眾上法堂內次第鴈行側立近法堂座為上首座書記藏主知客浴主於大眾前自為一班次第而立自餘頭首依眾而已如有退院長老在首座上相去兩位微側身面南而立第二通鼓四知事赴參次第而行於法堂門內拜蓆近南面法座而立監院在東童行聞第一通皷於庫堂前排定立候第二通皷即隨知事赴參問訊法堂大堂大眾過東邊面西而立以北為上赴叅童行須具鞋韈第三通皷侍者報覆住持人出大眾普同問訊住持人陞座於禪椅前立先侍者問訊燒香侍者即時上法座東邊不遠西面側立也次首座大眾轉身正望法座問訊然後歸位次知事近前問訊與首座等對立法座為上然後沙彌童行轉身法座前問訊訖依位而立廬山圓通童行單行入法堂問訊於東間作三行依位立知事問訊立三行童行從南相續行到法座前立定問訊訖東邊頭行者先次行次第相續歸舊位問訊立也知客引施主在知事上肩立以上主事從眾並鴈行立側聆住持人下座大眾普同問訊首座已下巡堂大眾立定住持人入堂次知事巡堂如山門有茶就位而坐知事在門外茶罷住持人起打下堂鐘如不點茶知事巡堂出祇候住持人問訊而退或三下後陞堂早晨依例放參參後更不巡堂凡遇陞堂除寮主直堂外並赴違者山門當有重罸深宜迴避如有他緣急切等事本非怠慢赴參稍遲如住持人已陞座更不須入亦當迴避住持人勿令見之大眾赴參不得戴帽子頭袖住持人同如問話人有可笑之事不得喧堂大笑及破顏微哂當生慇重肅聽玄音念誦三八日堂司行者齋後稟覆住持人訖然後掛牌至時堂中大殿土地堂打疊洒掃安排香火鳴鐘集眾大眾知事集住持人從土地堂大殿僧堂次第燒香唯佛前三禮住持知事以下上間立首座以下下間立維那斂鐘念誦初三十三二十三念皇風永扇帝道遐昌佛日增輝法輪常轉伽藍土地護法安人十方施主增福增慧為如上緣念清淨法身等云云初八十八二十八念白大眾如來大師入般涅槃至今皇宋元符二年已得二千四十七年以後隨年增之是日已過命亦隨減如少水魚斯有何樂眾等當勤精進如救頭燃但念無常慎勿放逸伽藍土地護法安人十方施主增福增慧為如上緣念清淨法身等云云念誦罷住持人先入依位立首座以下巡堂立侍者隨大眾後巡堂前門下間版頭空處立知事末後別作一班次第巡堂沙彌不巡堂在堂外面聖僧立遇知事住持人出躬身問訊暫到隨大眾後門內立退院長老如掛搭者在首座下一位立如不掛搭者依客位立後門北頰與住持人相對巡堂罷大眾歸寮問訊喫湯竟却入堂展單下帳如山林並擊大鐘住持人下殿維那斂鐘大眾問訊相繼念誦小參五日陞堂激揚宗旨三八念誦報答龍神請益玄言發明今古小參家訓綱紀叢林夫小參之法初夜鐘鳴寢堂設位集知事徒眾賓主問酬並同早參提唱之外上自知事頭首下至沙彌童行凡是眾中不如法度事無大小並合箴規所謂山門主首各自分司無致亂倫庶圖安靜首座朝晚坐堂早參及二時先赴知事如無急幹動眾自合齊來各運己長共興叢席一時暫為賓主終身便是師資無恃功勤潛生懈慢乃至雲堂兄弟直須道業精勤晝夜諮詢相彫琢明識規矩諳練叢林遊方行脚自合裝包達信馳書方宜擔籠作務應歸屏處經宿不得浸衣不得掉臂搖身跳行蹲坐扠腰偃蹇舞手猖狂行時先下脚跟爾乃足趾布地瞻視常宜尊重目前不過一尋往來者切忌穿堂上下間不得行道經呪唯宜默誦數珠不可有聲晨參暮請之時只得儼然叉手偏衫下須著內衣不宜露體鈐口履鞋禮須穿韈艸履無妨低打脚絣裙下無垂袴口踞坐收足常須按手蹇裳叉手當胷握右手在上合掌問訊斂指面相當衩衣掛子不合看經涕唾便旋豈宜向塔睡則帶刀右脇參時鴈立側聆臥具衣服常須齊整非己單蓆不得擅移開單摺被低細用心背面上床叢林齒笑床上行立禮度乖違袈裟臨臥淨巾疊襯枕前無卸上衣緩急提防賊盜連床宴坐不得背靠版頭廊廡經行切忌高聲語笑堂中聚話夜後拖鞋揭簾不垂後手洗面桶杓喧轟涕唾有聲驚動清眾褁作丸藥戲玩多言尊殿上倚靠欄干浴室內公然裸露不依本分主管院門走扇是非妄生節目送亡僧無追慘之懷遇唱衣有餘直之意論修行不稟尸羅爭坐位方排戒臘粥飰不曾稱意唯談他處供須茶湯受請不來只怪主人無禮受人寄附併合衣盂親近後住侮慢尊德遠別師僧父母本圖問道參禪若無佛法身心何以超凡入聖設有一知半解不須鼻孔撩天縱饒廣學多聞正好脚跟著地有底偎刀避箭不肯荷負叢林既非同死同生可謂辜他先德況是出家行脚入眾參禪粥飰茶湯晨參暮請語言事業動止威儀應係眾中規矩並當委曲提撕若其緘口無言迤邐玄綱墜地後進如蒙法藥應當刻骨銘肌斂片善以無遺剔纖瑕而必去小參之設意在斯焉結夏行脚人欲就處所結夏須於半日前掛搭所貴茶湯人事不至倉卒四月十四日齋後掛念誦牌至晚知事豫備香花法事於土地前集眾念誦詞云竊以薰風扇野炎帝司方當法王禁足之辰是釋子護生之日躬裒大眾肅詣靈祠誦持萬德洪名回向合堂真宰所祈加護得遂安居仰憑尊眾長聲念云云又云念誦功德並用回向護持正法土地龍神伏願神光恊贊發揮有利之勳𣑽苑興隆永錫無私之慶再憑尊眾念十方等略聲法事打鼓赴堂也知事預令行者祇候纔聞略聲法事即使打鼓堂司預設戒臘牌香花供養在僧堂前設之次第巡堂就位坐知事一人行法事本合監院行事有故即維那代之念誦已前先寫牓呈首座請之牓云庫司今晚就雲堂煎點特為首座大眾聊表結制之儀伏冀眾慈同垂光降庫司比丘某等敬白十五日粥前知事頭首小師法眷先來方丈內人事如住持人隔宿免人事更不須上方丈也陞堂罷知事近前兩展三禮一展云此際安居禁足獲奉巾瓶惟仗和尚法力資持願無難事又一展敘寒暄觸禮三拜住持人云此者多幸得同安居亦冀某人等法力相資無諸難事首座大眾皆同此式也次首座大眾於住持人前兩展三禮是時小師侍者卑行法眷沙彌在一邊立未得與大眾雷同人事大眾禮畢知事先歸庫堂主位立首座領大眾庫司人事觸禮三拜是時小師侍者法眷等徃法堂上禮拜住持人次首座到僧堂前面南向大眾面北各觸禮三拜依戒臘巡堂立定知事入堂聖僧前大展禮三拜起於首座前觸禮三拜大眾答拜巡堂出住持人入堂燒香大展三拜起是時小師於聖僧後避立法眷隨大眾於首座觸禮答拜巡堂同前小師候大眾答拜起却依位立祗候問訊住持人出堂首座已下對禮三拜云此際幸同安居恐三業不善且望慈悲首座已下歸寮如候眾寮寮主首座已下各觸禮三拜致語同堂中之法住持人從庫堂起巡寮次第大眾相隨送至方丈大眾乃退然後眾僧各行隨意人事堂頭庫司首座次第就堂煎點然後堂頭特為知事頭首請首座大眾相伴次日庫司特為書記頭首已下請首座大眾相伴然後首座就寮特為知事頭首請眾相伴自餘維那已下諸頭首退院長老立僧首座特為知事頭首就本寮煎點解夏七月十四日晚念誦煎湯來日陞堂人事巡寮煎點並同結夏之儀唯牓狀詞語不同而已庫司湯牓略云聊表解制之儀土地堂念誦切以金風扇野白帝司方當覺皇解制之時是法歲周圓之日九旬無難一眾咸安誦持諸佛洪名仰報合堂真宰仰憑大眾已下與結夏念誦同知事等謝詞伏喜法歲周圓無諸難事此蓋和尚道力廕庇下情無任感激之至住持人謝詞伏喜法歲周圓皆謝某人等法力相資不任感激之至堂中首座已下寮中寮主已下謝詞九夏相依三業不善惱亂大眾伏望慈悲知事頭首告云眾中兄弟行脚須候茶湯罷方可隨意如有緊急緣事不在此限冬年人事節前一日堂頭有免人事預貼僧堂前至晚堂內庫司點湯冬牓云聊表至節陳賀之儀年牓云聊表改歲陳賀之儀首尾同前堂頭就僧堂煎點牓詞同前次日方丈內特為知事頭首請大眾相伴次日知事就庫司特為首座已下煎點首座維那以次煎點各就本寮特為如不免人事即粥前小師等人事上堂罷大眾等人事巡堂巡寮堂上掛巡寮牌寮中寮主首座設坐位香華或茶或湯祇候住持人近鳴版集眾於寮外次第向寮門排立問訊參隨住持人入寮寮主燒香罷大眾問訊或茶或湯住持人說事訖臨起寮主近前展坐具陳謝詞云伏蒙和尚法駕訪臨下情不任感激之至次敘時暄如不受禮大眾問訊相送出寮如非解結旦望巡寮即不須相送巡寮迎接近上尊宿入院預先集眾門首相迎大眾同上法堂住持知事大眾次第人事訖送歸客位却上看住持人如不入客位即便看主人主人相伴巡寮却迴方丈喫湯而散然後主人就客位陳謝如非法屬賓主皆用門狀當日晚參次日陞堂置食特為如平交已下即臨事看詳接官之法監司守令方動眾迎接知事在二門外首座已下在三門內從外為上送官之法首座大眾從內為上並須齊整不得參差如接送官員住持人在法堂上請知事知事諸監院有處立副院也維那典座直歲先請知事頭首前資勤舊喫茶茶罷住持人咨聞某知事告退煩大眾同議不知何人可充某知事顧問再三大眾無語和尚即云欲請某人充某知事眾意如何眾允即令侍者請某人及某人相知并以次當請之人再點茶罷住持人起立云某知事告退不可闕人欲請某人首座充某知事且望大眾同共禮請幸希不阻且以佛法為念請訖兩展三禮一展云新戒乍入叢林諸事生疎過蒙和尚差請下情無任恐懼之至又一展敘寒暄云伏惟和尚尊體起居萬福乃觸禮三拜眾知事等賀住持人兩展三禮一展云院門慶幸且喜新請某知事已領慈命下情無任欣躍之至又一展敘寒暄并觸禮如前次與新知事𮞏相賀謝各觸禮三拜謝詞云有荷推揚不勝慚悚賀詞云荷眾當才伏惟歡慶轉椅子當面喫湯告眾鳴鐘集眾入堂立定維那聖僧前燒香乃密稟住持人巡堂一匝問訊罷打槌一下云白大眾前某知事告退此務不可闕人適奉堂頭和尚慈旨令請某上座充某知事謹白再打槌一下乃知事頭首前資勤舊同共近前勸請受訖兩展三禮謝詞同前時維那打槌一下云今已請得某人充某知事訖謹白又打槌一下知客引於聖僧前大展三禮收坐具於首座前觸禮三拜大眾答拜知客引巡堂出維那白云請大眾送知事入庫堂如請維那即知客或頭侍者白云請大眾送維那入堂司住持已下送至庫堂或堂司住持人依主位立新知事於住持人前兩展三拜送住持人出次歸位與同事人觸禮三拜次與首座大眾觸禮三拜送大眾出庫司或堂司行者以箱複收衣被歸本處安排知客引巡寮先到堂頭照位喫湯勤舊相伴次第巡寮竟住持知事頭首同共新舊知事交割錢帛所記文簿等或當日或來日點茶煎湯而退次日庫司特為置食新充知事且依舊來規矩未得妄有更張及自誇詫如有己見候款曲與住持人及同事商量可行即行可止即止不得違公徇私擾亂大眾次日住持人堂中特為新舊知事煎點茶牓云堂頭和尚今晨齋退就雲堂點茶特為新舊某知事即表賀謝之儀兼請首座大眾同垂光伴今月日侍者某敬白茶牓貼堂外上間新監院候堂頭首座等茶湯罷入堂與首座大眾煎點茶牓云庫司今晨齋退就雲堂煎點特為首座大眾兼請諸知事相伴伏望眾慈特垂光降今月日知事比丘某敬白齋前具箱複托茶牓呈首座詞云上聞首座今晨齋退特為堂中煎點伏望慈悲降赴或觸禮三拜此請會住院尊宿及立僧首座也或只問訊而退茶牓即令行者貼堂外下間及令行者請諸寮頭首乃就堂頭禮請住持人兩展三拜一展云今晨齋退堂中特為首座煎點敬請和尚與大眾相伴伏望慈悲特賜開允又一展敘寒暄乃觸三禮拜自請同事入堂伴眾次日庫堂內特為交代知事頭首請首頭大眾相伴然後知事首座頭首次第特為新舊知事煎點如副院典座直歲即就庫堂維那就堂司特為同事交代煎點唯堂頭監院首座入點煎點文林郎寧國軍節度推官吳時挍勘朝奉大夫權知邵武軍主管勸農公事周玭再挍正朝請大夫新知郴州主管學事兼管內勸農營田事借紫金魚袋虞翔刊行
