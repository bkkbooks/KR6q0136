body:
  text: 知客官員檀越尊宿僧官及諸方名德之人入院相看先令行者告報堂頭然後知客引上竝照管人客安下去處如尋常人客只就客位茶湯欲往堂頭庫下及諸寮相看只令行者相引旦過寮內床帳動用常須齊整師僧旦過且在溫存檀越齊設相看行香竝係知客引領賓客相看竝須恭謹不得妄談無益之事常須如實讚歎主人知事頭首竝大衆美事令人生善家醜不得外揚庫頭庫頭之職主執常住錢穀出入歲計之事所得錢物即時上曆收管支破分明齊料米麥常知多少有無及時舉覺收買十日一次計曆先同知事簽押一月一次通計住持人已下同簽金銀之物不宜謾藏見錢常知數目不得衷私借貸與人如主人竝同事非理支用即須堅執不得順情常住之財一毫已上竝是十方衆僧有分之物豈可私心專輒自用如非院門供給檀越及有力護法官員竝不宜將常住之物自行人事如有借貸米麥錢物除主人及同事自辨衣鉢外常住之物不可妄動當庫行者須有心力解計算守己清廉言行真的衆所推伏方可委付如山野寺院城市稍遠衆僧所用及藥蜜茶紙之類亦宜準備僧行回買常存道念不可憚煩病僧合用供給之物不得闕少如遇打給即時應副如倉廩疏漏鼠侵耗米麥蒸潤常住物色頓放守護若不如法竝係庫頭照管白同事人處置浴主已上竝為六箇頭首設浴前一日刷浴燒湯至日齊前掛開浴或淋汗或淨髮牌鋪設諸聖浴位及淨巾香花燈燭等竝衆僧風藥茶器齊後打版同施主入堂內燒香禮拜請聖入浴良久打疊鳴鼓請衆前兩會衆僧入浴後一會行者入浴末後住持知事人入浴浴室內打版之法一湯二水三滿入浴之法老宿上堂後生下堂各具淨巾浴具不得裸露無慚高聲語笑敲磕桶杓涕唾污穢洗浣衣物火焙烘風及赤腳趨浴觸污淨道竝衆僧浴水常須回互尊長不得唐突如有違法亦須浴主軟語開喻不得作色忤衆切宜依時設浴供給寮衆不可闕事遇開浴日守待打併火燭了當竝刷浴室令淨方可隨意歇息文曆只係堂頭簽押街坊水頭炭頭華嚴頭粥街坊米麥街坊菜街坊醬街坊水頭炭頭燈頭華嚴頭般若頭經頭彌陀頭竝是外勸檀越增長福田內助禪林資持道果若非契聖運心何以普酬衆望磨頭園頭莊主廨院主磨頭之職漏篩欲細所以去瓦礫也塵篩欲粗所以去塵坌也漏篩須用扇車塵篩須打三百新麥不須淘洗煞麥宜淘二斗拌八斗以陰之九月淘三斗每月增一斗至十二月淘六斗正月淘五斗每月減一斗至四月淘二斗淹拌一宿令不乾不濕此其大法也故諺云粗塵細漏按四季淘麥然更看麥之乾濕增減淘陰麥乾或濕取稍難第一第二若不細磨亦難得第一第二是蒸作第三是濕第四第五是洗羅須轉開不宜腳蹴磨用布裙庶免塵污磨邊不宜積糞常令纏道乾平兩次餵飼頭口水草無令失時夏月日長多渴更增一次飲之套項常令平正拽細宜在整齊照管綰絆隄防磨𢲉病患者及早醫治羸困者即容歇息行者人工之類勤勤䇿發道心園頭之職糞地築畦布種生芽澆水耘草竝須及時應當審問諳練慣熟之人相度天時地利常令蔬菜相續存留好者供衆有餘方可出賣逐時修換家事常與典座圓融大略言之初春種萵苣蔓菁莙薘寒食前茄子瓠子黃瓜決明葵菜蘭香五月半種蘿蔔六月半種秋黃瓜七月半種薹子菠薐莊主之職主官二稅耕種鋤耨收刈持梢栽接窠木泥築垣墻收般糞土須及時躬親部領守護地邊明立界至飲飼頭口省减鞭打安停客戶選擇良家針線婦人常居顯處錢穀文曆收破分明酒肉䓗薤無使入門展散投託不須應副行者人工方便驅策南鄰北里善巧調和間雜之人慎無延納師僧旦過恭謹承迎無以常住錢物抄注諸方僧供忽若牛驢歿故竝須掘地深埋早持皮角輸官無使公司怪問如有踐踏田苗侵犯禾稼但可叮嚀指約不得捶罵申官秋成場戶主客抽分計結文曆分明更與多方饒借如有創造翻修預白院門知事廨院主之職主院門收糴買賣僧行宿食探報郡縣官員交替應報公家文字或收蔟院門供施財利或迎待遠方施主延壽堂主淨頭堂主須請寬心耐事道念周旋安養病僧善知因果之人堂中所用柴炭米油鹽醬菜茶湯藥餌薑棗烏梅什物家事皆係堂主緣化如其無力唯米油炭就常住打給如病僧入堂將息令行者打疊床位如法安排煎煮湯藥供過粥飰逐時問訊務令適意如病人苦惱多生嗔怒粥飰湯藥動不如意及呻吟叫喚屎尿狼籍竝須憫念看承不得心生厭賤如欲沽酒下藥及以浸藥為名食啖魚肉葱薤貴圖補益是時堂主當於禁戒因果善言開諭令堅正念勿縱邪心嚴戒供過行者剪剃針線之人不得潛隱藏帶酒肉入堂合藥如須用酒當令院外浸漬及以酒糊為丸煎藥用葱皮合藥肝腎魚肉尚猶不可何況恣心食啖也病僧若可擔擎及稍進粥飰勸令持齊不宜輕毀禁戒堂中鍋釜不得令人練帛有妨病僧使用非係堂中將息之人不得延客粥飰有處病僧在堂竝上文曆以憑庫司打給竝請齊襯病僧如稍困重報堂司抄劄遷重病閣若非道眼精明竝勸令專念阿彌陀佛祈生淨土若勸率同袍打磬念之極妙八福田中看病最為第一佛法僧父母師長貧窮橋梁義意疾病乃八福田也況出家之人雲遊萍寄一有疾病誰為哀憐唯藉同袍慈悲安養誠為重任豈可輕心淨頭之職五更上燈日出收茆籌淨布浸之次刷洗茆槽併疊掃地添換茆籌淨巾竝灰土皂角打當水廨齊後洗濯籌布晚後燒湯上油常令湯水相續無使大衆動念淨頭者行人之所甚難當人之所甚惡可謂無罪不滅無罪不愈無福不生同袍拱手上廁寧無慚愧之心殿主鐘頭殿主閣主塔主羅漢堂主水陸堂主真堂主鐘頭拂拭塵埃列正供具以時灑掃莊飾香燈參後展席以待衆人瞻禮付法傳說賓吒王死作千頭魚常為劒輪斫首痛不可言每聞鐘聲則劒輪不下晨昏扣鐘無非佛事高僧傳釋智興如法鳴鐘聲震地府受苦者皆解脫聖僧侍者爐頭直堂聖僧侍者供過齊粥茶湯香火燈燭及與堂司行者灑掃堂中拂拭函匱打疊几案列正供具齊時供養罷收聖僧襯錢入筒筒安首座版頭柱上以襯錢略呈首座入之二時打下堂槌候住持人復鉢方可進槌即退身於聖僧帳後立以避住持人問訊大衆如聖僧所得衣物施利除袈裟襯錢同維那收掌支破外自餘巾帕針線茶藥看經錢結緣等物竝係聖僧侍者所得爐頭雖維那所請亦係炭頭和會選舉十月一開爐二月一閉爐放參前裝爐粥前添炭相度寒暖臨時添减如天暖炭多則枉用信施如天寒炭少則大衆冷落掃拂拭常令嚴淨兄弟圍爐𮞏相回避不得畫灰撥火敲火筯作聲聚頭間話擅便取火尉焙等用如直堂之法從上間第二座被位為頭次第輪轉終而復始主看守堂中衆僧被位衣鉢早晨長版時大衆集時將直堂牌於當日上座前問訊云上座今日直堂交牌訖問訊歸位如食位與被位相遠即須記被位不看之人於何知粥飰所貴至時不煩尋討如只在鄰位亦當下床納牌受牌人但問訊納之並不下床直堂人常在堂中於上下間照管如有所幹須請熟分兄弟暫時看守竝不得赴升堂及延壽堂竝外請念誦諸處茶湯如全衆出入除維那指揮鎖堂竝不得擅離所守至放參後方可隨意如堂中去失係是放參已前方是直堂人任責直堂以放參為限也欲開函匱或抽衣被竝先白直堂人知如不先報即當審問開靜已前放參已後衆中兄弟竝不得開函匱及抽取衣被如送入衣被則不妨如有所犯即鄰位及衆人呵止不得規避直堂預遷被位令堂衆動念寮主寮首座寮主依入寮先後輪請或當一月或當半月或十日各逐所在主看守衆僧衣鉢本寮什物動用竝具文帳上下交割掛搭新到茶湯特為竝新舊交代相煎點裝爐打炭添湯貯水灑掃併淨打疊拂拭恭勤不倦奉事清衆寮中如有不如法事軟語陳白不得指揮呵責令衆動念寮中什物有闕因住持人巡寮借問方便白知亦不得妄有陳請供衆湯瓶兄弟不得洗衣炮虱買賣間雜之人竝不得放入寮內防有去失寮中首座當請久住宿德諳練事體之人同寮主於寮中止宿看守衆僧衣鉢竝特為新到如恐事煩一香一藥一茶而已如兄弟喧噪同寮主和勸未開靜已前不得容兄弟入寮放參已後不得入籠閣竝擅便開籠如有急事或取湯藥或暴寒取衣竝白首座或寮主知然後開籠非維那所請不得令於寮中止宿堂頭侍者如請侍者須色力少壯辭令分明梵行清修心機轉旋自然堂頭諸事一切現成煎點茶湯各依時節往來賓客咸得觀心由是尊宿安然傳道雖係維那所請亦須方丈選擇外侍者如遇大座煎點預先稟白然後出榜請客排位燒香禮數威儀竝須如法賓客相看須知緊慢或即時報覆或欵曲咨聞或人下書引見主人竝報書司回答或新到相看茶湯特為請話入室念誦放參及結夏臘次牌竝外侍者主之內侍者收掌堂頭衣鉢支收文曆竝方丈內公用物色主管茶湯紙筆冬夏衣物常令準備齊整不得闕事如有闕少預先咨白欲估倡堂頭衣物即與維那同之內外侍者雖分司列職常須和同供給茶湯勿分彼此如夜間珍重粥前問訊即當稟問來日或今日有煎點茶湯及處置之事職分之外竝不得言知事頭首及衆中長短之事住持人語言亦不得衆中宣說請客辨事當以奉師供衆為心不得辭憚辛苦及見主人之過退有後言亦不得學住持人可否諸方抑揚大衆但念恭勤侍奉贊助叢林百事小心無動主人之念
