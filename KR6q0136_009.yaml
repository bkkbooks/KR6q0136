body:
  text: 沙彌受戒文行者初請得度牒以箱復托呈本師並知事頭首各禮謝三拜選日剃度維那司請受戒一人引請闍梨一人作梵闍梨一人隔宿剃頭但頂心留方寸許至日僧堂或法堂上安排設戒師高座前鋪氈席香案上用手爐淨瓶戒文並界方二條又相對戒師設作梵闍梨座並磬一口如在法堂上即別安聖像香花供養卓子二隻箱復二面一安袈裟一安裙衫在聖僧或聖像前列之堂下安排拜席一領事辦集衆若用法事迎引從童行堂至土地堂及大殿然後入僧堂內剃頭行者諸處各禮三拜剃頭行者即從僧堂前祇候大衆集定戒師二闍梨於聖像前大展三拜訖戒師作梵闍梨就座乃入法事引請闍梨於戒師前大展坐具三拜胡跪合掌戒師問引請答僧集否已集和合否和合僧今和合何所作為為當院行者某甲剃頭受戒可爾引請闍梨收坐具起引行者入堂行者於聖僧前禮三拜聞磬聲禮聞磬聲起又禮戒師三拜胡跪合掌引請闍梨亦展坐具胡跪合掌作梵闍梨作優波離梵如不能即作云何梵云何於此經究竟到彼岸願佛開微密呪香廣為衆生説為剃頭受戒者説戒師聞梵聲秉爐至微密處呪香並薰顯戒文云戒香定香慧香解脫香解脫知見香光明雲臺遍法界供養十方無量佛十方無量法無量僧見聞普薰證寂滅一切衆生亦如是戒師梵終疊云為剃頭受戒者説即將今晨開啓剃頭受戒功德回向皇帝萬歲臣統千秋天下太平法輪常轉龍天土地增益威光護法護人無諸難事十方施主福壽莊嚴合道場人身心安樂師長父母道業超隆剃頭沙彌修行無障三塗八難咸脫苦輪九有四生俱登覺岸仰憑尊衆念清淨法身云云至摩訶般若波羅蜜引請闍梨秉爐云請師言句汝合自陳汝若不能隨我聲道至某甲處稱名大德一心念我某甲今請大德為我作剃頭受戒阿闍梨我依大德故得剃頭受戒慈愍故三説第三疊慈愍故三遍行者第一第二第三各小禮三拜又大禮三拜胡跪合掌善男子每呼善男子即當應喏心源湛寂法海淵深迷之者永劫沈淪悟之者當處解脫欲專妙道無越出家放曠喻如虗空清淨同於皎月修行緣具道果非遙始從尅念之功畢證無為之地所以大覺世尊捨金輪之寶位子夜踰城脫珍御之龍衣青山斷髮容鵲巢於頂上挂蛛網於眉間修寂滅而澄真常斷塵勞而成正覺三世諸佛不説在家成道六代祖師阿誰行染度人所以佛佛授手祖祖相傳不染世緣方成法器故得天魔拱手外道歸心上酬四重之恩上濟群生之苦所以云流轉三界中恩愛不能捨棄恩入無為直是報恩者出家之後禮越常情不拜君王不拜父母汝今可離此座想念國王水土之恩父母生成之德專精拜辭後不拜也引請闍梨收坐具起引行者同問訊出堂行者於堂下拜辭國王父母捨俗服著裙衫訖引請闍梨引於聖像前禮三拜就戒師座下禮一拜近前胡跪合掌戒師誦偈執瓶水灌頂並剃髮少計傍僧同誦善哉大丈夫能了世無常棄俗趣泥沍希有難思議三説沙彌退身禮三拜引請闍梨引行者於本師座前禮一拜近前胡跪合掌本師執刀云最後一結謂之周羅唯佛一人乃能斷之我今為汝除去頂髮汝今許否答曰可爾本師云仰大衆同聲誦落髮偈毀形守志節割愛辭所親出家弘聖道誓度一切人三説退身禮一拜復於師前胡跪合掌本師持袈裟誦偈云大哉解脫服無相福田衣披奉如來戒廣度諸衆生沙彌披袈裟訖禮本師三拜禮聖像三拜禮戒師三拜胡跪合掌引請闍梨亦展坐具胡跪合掌善男子法如大海漸入漸深汝既出家當先受三歸五戒方得事近大僧次受沙彌十戒乃可同僧利養事在專誠不宜慢易我今為汝召請三寶證明佛事兼以至十戒竟奉請無邊佛寶海藏金文十地三賢五果四向同垂感降共作證明三説善男子欲求歸戒先當懺滌愆瑕如人浣衣然後加色汝今至誠隨我懺悔我昔所造諸惡業皆因無始貪嗔癡從身口意之所生一切我今皆懺悔善男子汝既淨治身口意業次應歸依佛法僧寶歸依佛歸依法歸依僧歸依佛兩足尊歸依法離欲尊歸依僧衆中尊歸依佛竟歸依法竟歸依僧竟如來至尊等正覺是我道師我今歸依從今已去稱佛為師更不歸依邪魔外道慈愍故三説第三疊慈愍故三遍沙彌第一第二第三各小禮一拜一大禮三拜胡跪合掌善男子汝既捨邪歸正戒已周圓若欲識相護持應受五戒盡形受不殺生不偷盜不淫欲不妄語不飲酒是五戒相汝能持否答云能持上來五支淨戒一一不得犯汝能持否答云能持三問三答是事如是持沙彌大禮三拜胡跪合掌善男子五戒為入法之初因出三塗之元首次受沙彌十戒即形備法儀此稱勤䇿依師而住受利同僧是為應法沙彌應當頂受盡形受不殺生不花髻瓔珞香油塗身不偷盜不歌舞作唱故往觀聽不淫欲不坐臥高廣大床不妄語不非時食不飲酒不捉金銀錢寶已上十事是沙彌戒汝能持否答云能持上來十支淨戒一一不得犯汝能持否答云能持三問三答是事如是持沙彌大禮三拜胡跪合掌善男子汝今受戒之後當須頂戴奉持不得違犯所持戒律供養三寶勤種福田於和尚阿闍梨一如法教於上中下座心常恭敬精進行道報父母恩衣取布素不以文彩食取支命不得嗜味花香脂粉無以近身好聲邪色一無視聽徐言持正勿宣人短儻有爭者兩説和合男女有別草木無傷非賢不友非聖不宗法服應器常與人俱非時不食非法不言精勤思義溫故知新坐則禪思起則諷誦閉三惡道開涅槃門於比丘法中增長正業菩提心而不退般若智以長明普度衆生祈成正覺用心如此真佛弟子作梵闍梨作神仙梵云神仙五通人作者於呪術為彼慚愧者攝諸不慚愧如來立禁戒半月半月説已説戒利益稽首禮諸佛戒師聞𣑽聲秉爐至𣑽終回向云上來剃頭受戒先用回向堂頭和尚常為苦海津梁執事高人永作法門梁棟合堂清衆同乘般若之舟剃頭沙彌速至菩提之岸四恩總報三有齊資法界衆生同圓種智為如上緣念十方三世一切諸佛諸尊菩薩摩訶般若波羅蜜作梵闍梨鳴磬云處世界如虗空如蓮花不著水心清淨超於彼稽首禮無上尊歸依佛得菩提道心常不退歸依法薩般若得大總持門歸依僧息諍論同入和合海上來剃頭受戒功德無限殊勝良因散周沙界和南聖衆引請闍梨聞處世界收坐具起令沙彌禮拜沙彌大禮戒師三拜次禮聖僧三拜問訊出堂門外立戒師二闍梨於聖僧前大展三拜出堂外立僧堂前鳴小鐘子三下大衆下堂各具威儀於法堂上禮賀住持人如法堂上剃頭即於𮄊堂內禮賀戒師二闍梨一展云人差受戒不敢告辭人事荒疏久淹尊重下情無任皇恐之至又一展敘寒暄伏惟和尚尊體起居萬福仍又觸禮三拜住持人云沙彌披剃有煩道用即容詣寮陳謝知事禮賀一展云法門有幸神足披緇下情無任喜躍之至又一展敘時暄又禮三拜住持人云沙彌披剃有煩荷覺即容詣寮陳謝大衆禮賀資詞同知事住持人云此者沙彌受戒有煩證明即容詣寮陳謝侍者小師禮賀大展三拜云沙彌得度舉衆同歡仰對尊慈倍深喜躍又三禮敘時暄又禮三禮也知事大衆歸寮各具香火排立祇候是時大衆才退沙彌禮三禮云叨圓頂相幸挂田衣遂脫塵牢永拋愛網下情無任感激之至三禮敘寒暄又禮三拜住持人巡寮過乃禮知事頭首戒師闍梨並諸法眷謝大戒詞萬歲天寧之節特啓霜臺三翻羯磨既圓已登戒品此蓋某人宿承佛記誓度群迷唯將繫草之心上答浮囊之賜下想無任感激之至訓童行童行初來投院師主審問根源若具正因方可容納如其意圖衣食規避徭役因事遁竄及父母不允者並不可留投院狀式投院童行姓某名某年若干本貫某州某縣某鄉某里人事或是郭下人事在身並無雕青刑憲及諸般違礙今為生死事大久慕空門蒙父母情允許捨入本院出家為童行如無父母即云今欲投院出家為童行伏乞堂頭和尚慈悲容納謹狀年月日具前位某押狀送如有父母即連狀書名住持人押狀付知事新到童行於庫司參禮訖將行李入童行堂參禮堂主訖堂主挂搭並指床位至晚參大衆行者巡堂立定堂主將新到禮參頭已下三禮或六禮不答禮巡堂一匝下位立今具規矩如後夫道不孤運引之由人欲成清淨叢林不可遺於細行而況布金地上選佛場中既預出家宜深慶幸今茲教示略舉三章若善依行方為佛子立身第一近事大僧當持五戒一不殺生有命之屬不得而殺二不偷盜不與而取皆為盜也三不淫欲遠離淫欲如避火坑四不妄語出家之人誠信為本五不飲酒食肉寧捨身命無犯此戒除齋粥外並不得雜食所謂果子並粥飲餅飰並不應食非常住差使不得出門非大緣事不得請假又參禪問道者收攝身心不得散亂念經求度者溫習經業不得懶墮又常念修行報答王臣荷戴之恩施主供給之恩父母養育之恩師長教導之恩又常思惟父母亡歿者恐入惡道應以修行濟父母見在者勸令歸依三寶發菩提心又著衣喫飯常知來處若不修行何門報答又行者上衣直裰為正自餘俗服非出家衣也鞋須白色不得紫皂須繫腰條不用勒巾答膊又衣服常須淨潔整齊直裰下不得露袴口冬夏當打腳絣又聽參行益及赴茶湯須具鞋襪行須斂手坐必端身不得倚靠不得掉臂及不得把臂同行又諸處逢師僧當斂身避路問訊令過見官員施主同行先當問訊僧家次當祇揖官員施主既出家持戒著真田衣直裰並不得跪拜俗家雖見父母只得祇揖又不淨之手不得捉經卷拈掇護淨之物香爐花瓶衆僧受用飲食之器又粥飰二時各念心經三卷報答十方施主供給僧行勞形喪命人畜微蟲端心授食不得説話每日晚參於佛殿前禮佛並須專心唱禮不得心緣他事口和音聲如常住作務罷參禪者屏處宴坐念經者上案誦習不得相聚戲笑又説非義之言若相罵相打種種違諍並非出家之人切宜禁戒晚參後無事不可過堂西並堂頭庫下行者寮作務處所及於屏處間話有智之人相警察凡為行者須是立身孤潔作事明白不得事涉嫌疑點污清衆陪衆第二既已出家參陪清衆常念柔和善順不得我慢貢高大者為兄小者為弟徐言持正勿宣人短儻有諍者兩相和合但以慈心相向不得惡語傷人若也欺凌同列走扇是非如此出家全無利益他人財物不得擅使別人衣被不得自移不得床上立地著衣不得背聖僧上床若揭門簾常垂後手不得敲磕作聲堂中不得露頭衩衣打靜已後未開靜已前除常住事不得於堂內及近童行堂説話堂中不得書寫毀畫破壞墻壁不得懸挂書畫圖慎及榜貼間雜文字腳頭不得安經案床頭不得置枕屏舊衣鞋襪安置床下衣單枕被常令整齊堂中尋常不得高聲説話喧亂大衆常須躡足輕行非自己衣單下不得坐臥間話參頭堂主常切提舉亦仰鄰床呵責禁止爐中不得撥火及敲火筯作聲爐中不得久坐有妨衆人打版茶湯並須齊赴看經寮舍令打疊淨潔不得説話浴室內不得裸形及不得高聲語笑不得床上立地著衣及床上立地梳頭堂主常管打靜間靜行者聞開靜便起不得耽著睡眠若授利養錢物不得隱匿當白入衆抽分一作務第三聞普請版須管及早齊赴上案處不得説話恐唾墮落衆僧食內獲罪不小普請處不得高聲説話何況喧閙呌笑常須靜默令俗人生善欲行益時先挽起衣袖洗手令淨僧堂前不得説話不得倚靠斜立不得撒手無禮輕放家事不得作聲入僧室不得急行大步應當安詳次第行益須看衆僧各人所要多少臨時斟酌不得垂手提鹽醋桶子行益處如嚏噴咳嗽當須背身若舁桶者斂間手當胸不得垂臂堂頭庫下諸寮舍供過行者常切小心護惜常住財物家事猶如眼睛及盡心扶持不得令住持知事衆僧動念如當次普請作務畫時各歸供過處所厨中局次行者各盡己長辨集僧事常令飲食及鍋竈家事猶先和會不得臨時爭競各宜道心供衆勿憚勤苦今雖小勞後獲大利諸殿堂行者當管灑掃淨潔香花供養切在整齊或遇風起諸殿堂不得點燈每日下供養當禮拜發願願四恩三有土地龍天法界衆生同圓種智打鐘行者不得失時常令灑掃並齋時燒香禮拜願聞鐘聲皆得解脫門子行者撿寮出入僧行無故上街及頻請假出入者常切照管謹慎火燭火頭上火常知緊慢不得與局次行者相違堂頭庫下茶頭行者常宜照管火燭及點撿茶湯園頭行者常令勤勞同心供給大衆不得懶倦辭避及守護行者凡所作務皆聽園頭支撥不得誤事諸莊行者所託非輕第一清廉不侵常住第二了事不惹官方第三善巧調和行者莊客與莊舍和睦不令鬪爭第四知時耕田下種各務合宜第五慈心照管頭口勿令羸瘦及不得令使牛人亂有鞭打第六護戒鈐束行者不作非違之事防關莊客不偷常住錢穀第七精勤常詣地頭照管地界及諸色田苗第八明本不為供勤三寶則是勞而無切車頭行者常須照管頭口充肥及不少欠斛斗在外止宿之處看守草料惜護行止不得飲酒食肉及作非違之事參頭堂主常務公心統衆不得挾私衆人有過須當舉白大則覆知事住持人行遣小則報典座罰錢入衆行者等若參頭支撥不得違背稍有稽遲右前件規矩並是出家細行如能委曲推行便為得度之本也他時若獲披剃高僧軌範一切見成却以此法教示初機自然令法久住如知而故犯犯而不悔非惟辜負四恩虗霑信施龍天土地皆所不容業果三塗何所逃避既是出家之輩自當因果分明時中不昧正因便是成佛有分
