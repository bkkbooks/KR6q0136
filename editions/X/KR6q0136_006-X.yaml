body:
  text: 法眷及入室弟子特為堂頭煎點早晨具威儀先見侍者云欲煩報覆和尚齋後欲就方丈點茶特為堂頭和尚侍者報訖引見堂頭問訊訖云請和尚坐如主人已據坐更不須云請坐也先大展三拜近前躬身云今晨齋退欲就方丈點茶特為堂頭和尚伏望慈悲俯賜開𠃔住持人云謹依來命不須作禮或答拜不答拜各逐尊𢍉又禮三拜或只敘請意大展三禮或一展請訖觸禮三拜各逐尊卑然後退身問訊出計會侍者安排坐位并照牌自請相伴人須請大頭首近上法眷及前資勤舊相伴齋後先上堂頭照管香火茶藥盞橐湯缾慮或失事次第客集不得打鼓集眾揖客就坐人數俱足然後入方丈迎請住持人就主位正坐住持人已收足乃近前問訊面西轉身香臺東過筵外西南角問訊訖叉手側立此明客位如堂頭煎點侍者燒香即向筵外東南角立以表主禮大眾坐定徐徐問訊離位香臺邊正立向主人問訊左手上香蓋香合訖不問訊叉手轉身於香臺東邊過向北住持人前問訊訖轉身歸舊位問訊立行茶遍約澆湯三五椀近前問訊乃請先喫茶也退身依位立湯缾出或為本師師翁煎點即侍者澆湯親自下茶以表專敬也於住持人前問訊勸茶依位立茶罷収盞若自下茶者須是自收盞良人伺候盞橐辨依前燒香於住持人前大展三拜近前躬身云欲延象駕再獻麤茶伏望慈悲特賜開𠃔又禮三拜或大展坐具先敘請意同前退禮三拜住持人云已承勤量何必再三答一拜不答拜各逐尊𢍉候住持人收足乃問訊轉身依位立藥遍近前問訊乃請喫藥復退身依位立行茶澆湯約三五椀或自下茶又復問訊乃請先喫茶也湯缾出復近前問訊勸茶轉身依位立候茶罷先収住持人盞或自𠬧盞住持人前大展三拜躬身近前云此日麤茶伏𫎇和尚慈悲降重下情無任感激之至住持人云重意烹茶不勝感激答拜不答拜各逐尊𢍉也又退身三拜或大展坐具躬身近前問訊先敘謝辭同前退身禮三拜如住持人不答拜煎點人禮竟又近前問訊罷退身近西义手側立住持人離坐珍重大眾入方丈時大眾並更不起身煎點人隨後送入問訊而退如住持人答拜煎點人第三拜未起時住持人更不還拜便合掌問訊大眾以表珍重之禮如僧堂內知事首座點茶住持人亦同此禮煎點人更不退身便送住持人歸方丈問訊而退却依舊位而立謝大眾云此日麤茶特為堂頭和尚伏蒙某人某人慈悲光伴下情無任感激之至觸禮三拜次第問訊依舊位立収盞罷問訊起送客只至筵外一兩步以表客無送客之禮却於侍者寮陳謝侍者通眾煎點燒香法堂中大座煎點齋前入堂禮請唯上香一炷齋後點茶或臨晚問湯第一飜上香兩炷第二翻上香一炷堂頭庫下諸寮就本處特為並準此唯無請禮非泛茶湯唯上香一炷置食特為置食之法齋前請訖長版動眾客齊坐定入卓燒香問訊特為之人自餘筵外普同問訊候上飰行遍即又燒香問訊特為之人下襯錢訖復面前問訊次第同前堂頭侍者行法事庫司主蓆者行法事謝茶堂頭置食點茶特為罷如係卑行之人即時於住持人前大展三拜如不容即觸禮三拜如平交已上即晚間詣堂頭陳謝詞云此日伏蒙管待特為煎點下情無任不勝感激之至古人云謝茶不謝食也拜禮臨時知事頭首特為茶湯並不須詣寮陳謝如眾中平交特為煎點須當放參前後詣寮謝之看藏經如遇施主請眾看大藏經或藏下或法堂上直歲安排椅卓典座排供過行者藏主準備茶湯香華燈燭維那依戒臘出牓分經并坐位照牌請法事又作梵闍棃書狀寫造開啟罷散文疏并看經大牓藏殿主出經至時維那鳴鐘集眾請經依位坐法事聲螺鈸知客點淨引施主行香竟當筵跪爐維那表歎宣開啟疏念佛闍棃作梵候聲絕然後大眾開經如遇病患將息及有眾緣在外維那収錢并函號候參堂及歸日分付看轉此事極好如病僧堅取經錢即須分付若有分俵大眾殘零不盡之經依尋常看經臘次牌分俵如施主於看經了日設齋供慶懺更須讀罷散文疏施主經錢並係堂司収掌分俵除常住童行利維那讀疏書記寫疏藏下香燭茶湯知客行香法事作梵錢外據見在多少契勘錢數分俵也監院照管大綱專切迎待施主藏主供給大眾茶湯常切告白護惜聖教看經之法藏主篇中具明子細看驗如不能看經即於堂司退免若已受經即須子細如法披尋早了為上非唯施主願心圓滿亦乃他時免負經債中筵齋如遇施主入院作中筵齋監院先問外請僧俗客若干食襯錢各若干然後報住持人知同典座定食次辨齋料直歲安排坐位或在庫司或法堂上香花奕幕隨家豐儉書狀依吉㐫齋意修寫文疏維那安排坐位照管住持人居主位出即監院代之首座分首如有尊宿名德可當席面即首座居住持人左手藏主已下依位列施主俗客在照位監院維那直歲在鼓下自餘頭首宿德相度安排遠則東西相照近則合榻相朝並從南為上魚鼓集眾鳴鐘就坐賓主問訊皆同入堂於聖像前先聲法事知客點淨引施主行香從住持人起至中筵東南角次從席面起至中筵西南角自餘從便以徑截為上行香罷施主像前跪爐法事唱禮維那宣疏念十聲佛施主就位如行香不用法事則請法事頭一人先唱恭敬頭一切恭敬信禮常住三寶此名略梵次第舉佛至行香罷法事唱如來梵如來妙色身乃至是故我歸依信禮常住三寶跪爐頭讀疏念佛就坐同前若無法事及不舉佛亦不讀疏維那鳴磬唱禮恭敬頭施主行香罷像前跪爐維那唱如來梵白齋意念誦施主就坐鳴磬結位復鳴磬一下首座施食次行香喝食遍中筵齋行者更不喝食但逐味行食遍在中筵外立之鳴磬一下大眾祇揖默然作觀然後出生喫食飰遍維那鳴磬首座施財或施主俵襯或知事代行大眾食畢法事頭或維那鳴磬念處世界如虗空等略取疏中大意迴向念十佛罷鳴磬而起或打磬兩下一以念食訖偈二以離位中筵大齋及早備辨如其過午則是非時出入若有緣事全眾出入或赴齋或念誦或接尊宿若粥後出則維那於粥前白堂齋後出則維那於齋時白堂白堂之法粥飰遍槌罷或施財罷打槌一下云白大眾今晨粥後聞鐘聲各具威儀普請於某處赴齋應係諸寮頭首捲簾齊赴謹白打槌一下維那乃於聖僧前問訊復於住持前問訊巡堂一匝如堂外有僧亦當問訊除後堂時至鳴鐘三門下齊集住持人行次首座次書狀藏主知客浴主名德勤舊並依戒臘次第而行直歲典座維那監院在大眾後庠序相隨無致差亂不得左右顧語言獻笑高聲課誦垂手掉臂若到處所安詳下笠候住持知事頭首大眾聚集一處同祇揖施主罷方可就位並當儼然恭默令起瞻敬之心若欲大小便不得疊袈裟安坐位机案而立須於眾外安袈裟於淨處事訖淨手披還貴免唐突清眾施主點淨行香俵襯並當專謹承迎不可慢易亦不得觀看書𦘕不得戲弄兒童凡是欲樂之境不得顧食畢參隨住持人歸院並不得留身幹事動人譏笑或買衣物或買藥草或相看施主或贍禮勝景或於別院迴禮師僧自餘不可盡言若有所幹候別日於堂司請假若赴念誦或接尊宿大綱准此諸寮頭首赴與不赴計在臨時警眾凡聞鐘鼓魚版須知所為五更鳴大鐘者警睡眠也次厨前打小鐘子者開小靜也諸寮供過行者及打頭等並皆先起次擊厨前雲版者開大靜也眾僧齊起方得摺疊單被及上蚊厨次打長版者眾僧下鉢也眾僧一時入堂次打木魚眾僧集定也後到者更不得入堂三通鼓鳴者住持人赴堂也堂前小鐘子鳴者眾僧下床祇候問訊住持人也維那最初打槌一下者眾僧開鉢也隨槌聲白念心經三卷次打槌一下者白設粥意也或表歎讀疏次打槌十下者念十佛名也次打槌一下者首座施粥也又打槌一下者粥遍也粥罷打槌一下者眾僧下堂也住持人出堂眾僧方可上鉢堂前鳴小鐘子三下乃放早參也如不放參堂上鳴鼓者陞堂也參罷茶畢堂前鳴小鐘三下者眾僧下床也齋前聞三下版鳴者眾僧下鉢也次鳴大鐘者報齋時也城隍先齋鐘後三下山林先三下後齋鐘自餘長版魚鼓堂前小鐘維那打槌食畢下堂並同晨粥之法唯施主設齋於遍槌後添施財槌一下次聞堂頭或庫下擊鼓或諸寮打版者眾僧赴茶也聞厨前鼓鳴者眾僧普請也聞堂前鐘鳴者或接送尊官或請知事或送亡僧也聞浴下鳴鼓者開浴或淋汗也至晚堂前鳴鐘三下者放晚參也三八聞大鐘或堂前小鐘者念誦也城隍集眾念佛皆擊小鐘山林先擊大鐘集眾然後擊小鐘念佛黃昏鳴大鐘者行者上殿念佛也或聞堂上鼓鳴者小參也從朝至暮鐘鼓交參非唯警悟大眾亦乃說法無間叢林高士各自知時開小靜之法先擊版三聲漸漸高大令聲調暢從慢至緊從重至輕為一會至二會殺聲徐徐打二下開大靜之法如開小靜之法但只長打一會也打長版木魚之法並輕手引聲漸漸高大令音聲調暢然後緊慢相參輕重相應凡至一會略歇少時所貴節會分明令聽者不悞至三會殺聲徐打三下上堂小參打鼓之法先輕擬鼓面三下然後重手徐徐擊之使其緊慢相參輕重相應音聲和暢起復連環隱隱轟轟若春雷之震蟄第一會延聲即長擊會終略歇少時第二會連聲稍促更不歇聲即便轉通第三會一向纏聲擊之候住持人陞座方始殺鼓雙槌連打三下齋鼓粥鼓之法並擊三會如陞堂之法但節會稍促而已浴鼓茶鼓普請鼓之法并長打一會更不轉通也擊堂前小鐘之法入堂鐘輕手引聲漸漸高大住持人入堂即立放參鐘先打版三下然後緩擊三聲念誦鐘如開小靜之法住持人入堂燒香罷於僧堂前立維那殺鐘念十佛名號訖兩下然後殺之下床鐘更不擊版連打二下接送請知事送亡僧鐘唯打一會維那打槌之法先問訊訖右手仰把槌柄臥砧面上令槌頭向身展左手兩指仰副槌楞徐運槌柄旋轉擊之即覆左兩指接砧楞然後手正下槌不得過五寸一轉槌不得離却本位也打大鐘之法先輕手擬鐘三下慢十八聲緊十八聲三緊三慢共一百八聲當職行者燒香禮拜誦偈訖然後擊之偈云三塗八難息苦停酸法界眾生聞聲悟道念竟即時輟之堂上鼓侍者主之庫下鼓監院主之齋粥版木魚開靜典座主之堂前小鐘維那主之大鐘如不請鐘頭維那主之打鐘行者典座主之已上鐘鼓如不應法則致令輕重失宜緊慢無節並當曉諭令音聲和暢為上馳書如下承嗣書遺書入院先馳書而專使到院知客安排位次訖法堂上一節如化主納疏之法書記宣讀單專使於住持人前兩展三拜一展云此馳專信得奉尊顏下情無任瞻仰之至又一展敘寒暄乃觸禮三拜知事首座大眾賀或慰住持人入院先馳無上一節首座大眾僧堂前立首座在門外上間第一位眾僧在下間排立安排香卓專使過疏與首座首座薰顯過與維那宣讀訖專使近前問訊首座退身立首座大眾入堂上立專使入堂行如化主參堂之法書同封皮貼安門外下間知客引專使入庫堂呈書與監院薰顯請維那讀訖然後人事茶湯如平常承嗣遺信及過往先馳只就方丈下傍持人書首座寮下首座大眾書貼安門外下間庫堂但呈監院已上下並不宣讀知客引巡寮如化主小師詣尊宿處下書候呈書訖方可禮拜發書書信之法須言語整齋寫染嚴謹剪裁封角如法令人生善及起瞻敬之心若諸事草率人不在意徒費紙筆及妨道業若與官員書信勸令减刑護法愛惜伽藍當面判憑不見僧家小過設有麁行且令護惜袈裟與同袍勸令禪誦香火覺悟無常或與尊宿書祝其捍勞忍苦傳法利生與施主書即勉令修善作福已上並不宜多談俗事語言以簡當激切為上封訖香薰遣之如非事不得已不宜妄發書信受書如得僧中近上尊敬之人所賜書信即當香薰望尊人所向禮訖開之如以次尊敬之人亦須香薰自開如是平交即令侍者或行者啟封並用剪開一頭欵曲取之不得折破封皮非唯不謹亦屬麤操讀訖如法安置一處常生感激之心不得意生容易如受官員書信亦當慇重讀訖即時念誦迴向裝嚴福慧將息參堂住持人服藥如非尋常病患三日已外當於別寮將息令侍者白首座知事如庫司知事及諸頭首有病並令供過行者白維那請假下延壽堂有處云省行堂將息如病患日微不妨眾務只就本寮將息如病體遷延即白住持人別請交代住持人病起陞堂陳謝大眾問疾下座知事首座大眾人事兩展三禮謝辭云攝養乖方有煩存問幸承法力粗獲痊安賀辭云伏喜和尚法位輕安下情無任不勝欣躍之至巡堂禮聖僧大眾次入方丈點大座茶知事病起參堂上禮謝住持人次於知事頭首及諸寮人事問訊眾中兄弟初覺有疾或自往或遣人報堂司請假將息及報寮主然後入延壽堂病起參堂先到堂司相看然後上方丈人事謝辭云此者上蒙法庇粗獲痊安下情無任感激之至答辭云且喜道體安樂伏惟懽慶次第詣知事諸頭首寮問訊堂頭已下諸頭首隨意茶湯不須特為
