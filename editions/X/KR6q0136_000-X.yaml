body:
  text: 禪苑清規序真定府十方洪濟禪院住待傳法慈覺大師宗賾集夫禪門事例雖無兩樣毗尼衲子家風別是一般規範若也途中受用自然格外清高如其觸向面牆實謂減人瞻敬是以僉謀開士遍摭諸方凡有補於見聞悉備陳於綱目噫少林消息已是剜肉成瘡百丈規繩可謂新條特地而況叢林蔓衍轉見不堪加之法令滋彰事更多矣然而莊嚴保社建立法幢佛事門中闕一不可亦猶菩薩三聚聲聞七篇豈立法之貴繁葢隨機而設教初機後學冀善參詳上德高流幸垂證據崇寧二年八月十五日序昨刊此集盛行于世惜其字畫磨滅今再寫作大字刻梓以傳收者幸鑒嘉泰壬戌虞八宣教謹咨重雕補註禪苑清規目錄第一卷受戒護戒辨道具裝包旦過掛搭赴粥飰赴茶湯請因緣入室第二卷上堂念誦小參結夏解夏冬年人事巡寮迎接請知事第三卷監院維那典座直歲下知事請頭首首座書狀藏主第四卷知客庫頭浴主街坊水頭炭頭華戲嚴磨頭園頭莊主廨院主延壽堂主淨頭殿主鐘頭聖僧侍者爐頭直堂寮主寮首座堂頭侍者第五卷化主下頭首堂頭煎點僧堂內煎點知事頭首煎點入寮臘次煎點眾中特為煎點眾中特為尊長煎點第六卷法眷及入室弟子特為堂頭煎點通眾煎點燒香法置食特為謝茶看藏經中筵齋出入警眾馳書發書受書將息參堂第七卷大小便利亡僧請立僧請尊宿尊宿受疏尊宿入院尊宿住持尊宿遷化退院第八卷龜鏡文坐禪儀自警文一百二十問誡沙彌第九卷沙彌受戒文訓童行第十卷勸檀信齋僧儀百丈規繩頌重雕補註禪苑清規目錄
